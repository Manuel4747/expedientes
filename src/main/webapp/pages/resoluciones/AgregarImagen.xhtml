<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>
        <p:dialog id="ResolucionesAgregarImagenDlg" widgetVar="ResolucionesAgregarImagenDialog" modal="true" resizable="false"  appendTo="@(body)" header="Alzar Documento" closeOnEscape="true">

            <h:form id="ResolucionesAgregarImagenForm" enctype="multipart/form-data">

                <h:panelGroup id="display">
                    <p:panelGrid  columns="2" columnClasses="column" rendered="#{resolucionesController.selected != null}">

                        <p:outputLabel value="Documento"/>

                        <p:panelGrid columns="2">
                            <p:fileUpload value="#{resolucionesController.file}" mode="simple" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser un pdf" invalidSizeMessage="El archivo debe tener hasta 100Kb" sizeLimit="102400" allowTypes="/(\.|\/)(pdf)$/" disabled="false" />
                        </p:panelGrid>
                    </p:panelGrid>
                    <p:commandButton value="#{mensajes.Save}" icon="ui-icon-arrow-u" ajax="false" onclick="monitorExporting(startHandler(0), endHandler)" update="display,:ResolucionesListForm:datalist,:growl" action="#{resolucionesController.saveDoc()}" disabled="false"/>

                    <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('ResolucionesAgregarImagenDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                </h:panelGroup>

            </h:form>

        </p:dialog>

    </ui:composition>

</html>
