<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:pe="http://primefaces.org/ui/extensions"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <div class="ui-g">
            <script>
                CKEDITOR.on("instanceReady", function (event) {
                    event.editor.on("beforeCommandExec", function (event) {
                        // Show the paste dialog for the paste buttons and right-click paste
                        if (event.data.name == "paste") {
                            event.editor._.forcePasteDialog = true;
                        }
                        // Don't show the paste dialog for Ctrl+Shift+V
                        if (event.data.name == "pastetext") {
                            if (event.data.commandData.from == "keystrokeHandler") {
                                event.cancel();
                            }
                        }
                    })
                });
                CKEDITOR.editorConfig = function (config) {
                    config.toolbarGroups = [
                        {name: 'document', groups: ['mode', 'document', 'doctools']},
                        {name: 'clipboard', groups: ['clipboard', 'undo']},
                        {name: 'editing', groups: ['find', 'selection', 'spellchecker', 'editing']},
                        {name: 'forms', groups: ['forms']},
                        '/',
                        {name: 'basicstyles', groups: ['basicstyles', 'cleanup']},
                        {name: 'paragraph', groups: ['list', 'indent', 'blocks', 'align', 'bidi', 'paragraph']},
                        {name: 'links', groups: ['links']},
                        {name: 'insert', groups: ['insert']},
                        '/',
                        {name: 'styles', groups: ['styles']},
                        {name: 'colors', groups: ['colors']},
                        {name: 'tools', groups: ['tools']},
                        {name: 'others', groups: ['others']},
                        {name: 'about', groups: ['about']}
                    ];
                };
            </script>
            <p:dialog id="ExpFormatosCreateDlg" positionType="absolute" widgetVar="ExpFormatosCreateDialog" modal="true" resizable="false" appendTo="@(body)" header="Formato" closeOnEscape="true">

                <h:form id="ExpFormatosCreateForm" enctype="multipart/form-data">

                    <h:panelGroup id="display" rendered="#{expFormatosController.selected != null}">

                        <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:outputLabel style="width: 100%" value="Descripción"/>
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                <p:inputText style="width: 100%" id="descripcion" value="#{expFormatosController.selected.descripcion}" title="Descripción" required="true" requiredMessage="Debe ingresar descripción"/>
                            </div>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:outputLabel style="width: 100%" value="Tipo Actuación" />
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                <p:panelGrid columns="1" style="width: 100%;" styleClass="ui-noborder">
                                    <p:selectOneMenu id="tipoActuacion" value="#{expFormatosController.selected.tipoActuacion}"  converter="expTiposActuacionConverter">
                                        <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                        <f:selectItems value="#{expFormatosController.listaTiposActuacion}"
                                                       var="tipoActuacionItem"
                                                       itemValue="#{tipoActuacionItem}"
                                                       itemLabel="#{tipoActuacionItem.descripcion}"
                                                       />

                                    </p:selectOneMenu>
                                </p:panelGrid>
                            </div>
                        </div>

                        <ui:remove>
                            <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12" align="left">
                                <h:outputText value="Alzar modelo en formato Word"/>
                            </div>

                            <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                <p:panelGrid columns="2" style="width: 100%">
                                    <p:fileUpload value="#{expFormatosController.file}" accept=".docx,.DOCX" mode="simple" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser un documento Word" allowTypes="/(\.|\/)(docx|DOCX)$/" disabled="false" />
                                </p:panelGrid>
                            </div>
                                <!--
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <pe:ckEditor id="editor"
                                                 value=""
                                                 toolbar="[['Cut','Copy','Paste','PasteText','PasteFromWord','-', 'Scayt'], '/', ['Undo', 'Redo']]"
                                                 skin="office2013"/>
                                </div>
                                -->
                            </ui:remove>

                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <pe:ckEditor id="editor" width="100%" height="500px" customConfig="#{expFormatosController.ckeditorConfig}" value="#{expFormatosController.selected.texto}" skin="office2013"/>
                                </div>
                                

                            <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                <p:commandButton id="botonGuardar" onclick="botonGuardar.disable()" action="#{expFormatosController.guardar()}" ajax="true" value="#{mensajes.Save}" update="display,:ExpFormatosListForm:datalist,:growl" oncomplete="handleSubmit(xhr,status,args,PF('ExpFormatosCreateDialog'));" >
                                    <f:ajax execute="@all" render="@form" onevent="endHandler();" onerror="endHandler();"/>
                                </p:commandButton>

                                <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('ExpFormatosCreateDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                            </div>
                    </h:panelGroup>

                </h:form>

            </p:dialog>
        </div>

    </ui:composition>

</html>
