<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="ExpNotificacionesCreateDlg" widgetVar="ExpNotificacionesCreateDialog" modal="true" resizable="false" appendTo="@(body)" header="#{mensajes.CreateExpNotificacionesTitle}" closeOnEscape="true">

            <h:form id="ExpNotificacionesCreateForm">

                <h:panelGroup id="display" rendered="#{expNotificacionesController.selected != null}">
                    <p:panelGrid columns="2" columnClasses="column">

                        <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_ci}" for="ci" />
                        <h:panelGroup>
                            <p:inputText id="ci" value="#{expNotificacionesController.selected.ci}" title="#{mensajes.CreateExpNotificacionesTitle_ci}" required="true" requiredMessage="#{mensajes.CreateExpNotificacionesRequiredMessage_ci}" size="20" maxlength="20"/>
                            <p:tooltip for="ci" value="#{expNotificacionesController.getComponentMessages('ci', mensajes.CreateExpNotificacionesHelpText_ci)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_nombresApellidos}" for="nombresApellidos" />
                        <h:panelGroup>
                            <p:inputText id="nombresApellidos" value="#{expNotificacionesController.selected.nombresApellidos}" title="#{mensajes.CreateExpNotificacionesTitle_nombresApellidos}" required="true" requiredMessage="#{mensajes.CreateExpNotificacionesRequiredMessage_nombresApellidos}" size="50" maxlength="100"/>
                            <p:tooltip for="nombresApellidos" value="#{expNotificacionesController.getComponentMessages('nombresApellidos', mensajes.CreateExpNotificacionesHelpText_nombresApellidos)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_tipoPersona}" for="tipoPersona" />
                        <h:panelGroup>
                            <p:selectOneMenu id="tipoPersona" value="#{expNotificacionesController.selected.tipoPersona}"  converter="tiposPersonaConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{tiposPersonaController.items}"
                                               var="tipoPersonaItem"
                                               itemValue="#{tipoPersonaItem}"
                                               itemLabel="#{tipoPersonaItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="tipoPersona" value="#{expNotificacionesController.getComponentMessages('tipoPersona', mensajes.CreateExpNotificacionesHelpText_tipoPersona)}"/>
                        </h:panelGroup> 

                        <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_cargoPersona}" for="cargoPersona" />
                        <h:panelGroup>
                            <p:selectOneMenu id="cargoPersona" filter="true" filterMatchMode="contains" value="#{expNotificacionesController.selected.cargoPersona}"  converter="cargosPersonaConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{cargosPersonaController.items}"
                                               var="cargoPersonaItem"
                                               itemValue="#{cargoPersonaItem}"
                                               itemLabel="#{cargoPersonaItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="cargoPersona" value="#{expNotificacionesController.getComponentMessages('cargoPersona', mensajes.CreateExpNotificacionesHelpText_cargoPersona)}"/>
                        </h:panelGroup> 

                        <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_despachoPersona}" for="despachoPersona" />
                        <h:panelGroup>
                            <p:selectOneMenu id="despachoPersona" filter="true" filterMatchMode="contains" value="#{expNotificacionesController.selected.despachoPersona}"  converter="despachosPersonaConverter">
                                <p:ajax event="change" update="departamentoPersona, localidadPersona" listener="#{expNotificacionesController.actualizarDptoYLocalidad()}"/>
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{despachosPersonaController.items}"
                                               var="despachoPersonaItem"
                                               itemValue="#{despachoPersonaItem}"
                                               itemLabel="#{despachoPersonaItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="despachoPersona" value="#{expNotificacionesController.getComponentMessages('despachoPersona', mensajes.CreateExpNotificacionesHelpText_despachoPersona)}"/>
                        </h:panelGroup> 

                        <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_departamentoPersona}" for="departamentoPersona" />
                        <h:panelGroup>
                            <p:selectOneMenu id="departamentoPersona" filter="true" filterMatchMode="contains" value="#{expNotificacionesController.departamentoPersona}"  converter="departamentosPersonaConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{departamentosPersonaController.items}"
                                               var="departamentoPersonaItem"
                                               itemValue="#{departamentoPersonaItem}"
                                               itemLabel="#{departamentoPersonaItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="departamentoPersona" value="#{expNotificacionesController.getComponentMessages('departamentoPersona', mensajes.CreateExpNotificacionesHelpText_departamentoPersona)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_localidadPersona}" for="localidadPersona" />
                        <h:panelGroup>
                            <p:selectOneMenu id="localidadPersona" filter="true" filterMatchMode="contains" value="#{expNotificacionesController.localidadPersona}"  converter="localidadesPersonaConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{localidadesPersonaController.items}"
                                               var="localidadPersonaItem"
                                               itemValue="#{localidadPersonaItem}"
                                               itemLabel="#{localidadPersonaItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="localidadPersona" value="#{expNotificacionesController.getComponentMessages('localidadPersona', mensajes.CreateExpNotificacionesHelpText_localidadPersona)}"/>
                        </h:panelGroup>

                        <ui:remove>
                            <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_estado}" for="estado" />
                            <h:panelGroup>
                                <p:inputText id="estado" value="#{expNotificacionesController.selected.estado}" title="#{mensajes.CreateExpNotificacionesTitle_estado}" required="true" requiredMessage="#{mensajes.CreateExpNotificacionesRequiredMessage_estado}" size="2" maxlength="2"/>
                                <p:tooltip for="estado" value="#{expNotificacionesController.getComponentMessages('estado', mensajes.CreateExpNotificacionesHelpText_estado)}"/>
                            </h:panelGroup>

                            <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_fechaHoraAlta}" for="fechaHoraAlta" />
                            <h:panelGroup>
                                <p:calendar id="fechaHoraAlta" pattern="MM/dd/yyyy HH:mm:ss" value="#{expNotificacionesController.selected.fechaHoraAlta}" title="#{mensajes.CreateExpNotificacionesTitle_fechaHoraAlta}" required="true" requiredMessage="#{mensajes.CreateExpNotificacionesRequiredMessage_fechaHoraAlta}" showOn="button"/>
                                <p:tooltip for="fechaHoraAlta" value="#{expNotificacionesController.getComponentMessages('fechaHoraAlta', mensajes.CreateExpNotificacionesHelpText_fechaHoraAlta)}"/>
                            </h:panelGroup>

                            <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_usuarioAlta}" for="usuarioAlta" />
                            <h:panelGroup>
                                <p:inputText id="usuarioAlta" value="#{expNotificacionesController.selected.usuarioAlta}" title="#{mensajes.CreateExpNotificacionesTitle_usuarioAlta}" required="true" requiredMessage="#{mensajes.CreateExpNotificacionesRequiredMessage_usuarioAlta}"/>
                                <p:tooltip for="usuarioAlta" value="#{expNotificacionesController.getComponentMessages('usuarioAlta', mensajes.CreateExpNotificacionesHelpText_usuarioAlta)}"/>
                            </h:panelGroup>

                            <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_fechaHoraUltimoEstado}" for="fechaHoraUltimoEstado" />
                            <h:panelGroup>
                                <p:calendar id="fechaHoraUltimoEstado" pattern="MM/dd/yyyy HH:mm:ss" value="#{expNotificacionesController.selected.fechaHoraUltimoEstado}" title="#{mensajes.CreateExpNotificacionesTitle_fechaHoraUltimoEstado}"  showOn="button"/>
                                <p:tooltip for="fechaHoraUltimoEstado" value="#{expNotificacionesController.getComponentMessages('fechaHoraUltimoEstado', mensajes.CreateExpNotificacionesHelpText_fechaHoraUltimoEstado)}"/>
                            </h:panelGroup>

                            <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_usuarioUltimoEstado}" for="usuarioUltimoEstado" />
                            <h:panelGroup>
                                <p:calendar id="usuarioUltimoEstado" pattern="MM/dd/yyyy HH:mm:ss" value="#{expNotificacionesController.selected.usuarioUltimoEstado}" title="#{mensajes.CreateExpNotificacionesTitle_usuarioUltimoEstado}"  showOn="button"/>
                                <p:tooltip for="usuarioUltimoEstado" value="#{expNotificacionesController.getComponentMessages('usuarioUltimoEstado', mensajes.CreateExpNotificacionesHelpText_usuarioUltimoEstado)}"/>
                            </h:panelGroup>

                            <p:outputLabel value="#{mensajes.CreateExpNotificacionesLabel_empresa}" for="empresa" />
                            <h:panelGroup>
                                <p:selectOneMenu id="empresa" value="#{expNotificacionesController.selected.empresa}" required="true" requiredMessage="#{mensajes.CreateExpNotificacionesRequiredMessage_empresa}" converter="empresasConverter">
                                    <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                    <f:selectItems value="#{empresasController.items}"
                                                   var="empresaItem"
                                                   itemValue="#{empresaItem}"
                                                   itemLabel="#{empresaItem.id.toString()}"
                                                   />

                                </p:selectOneMenu>
                                <p:tooltip for="empresa" value="#{expNotificacionesController.getComponentMessages('empresa', mensajes.CreateExpNotificacionesHelpText_empresa)}"/>
                            </h:panelGroup>
                        </ui:remove>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{expNotificacionesController.saveNew()}" value="#{mensajes.Save}" update="display,:ExpNotificacionesListForm:datalist,:growl" oncomplete="handleSubmit(xhr,status,args,PF('ExpNotificacionesCreateDialog'));">
                        <p:confirm header="#{mensajes.ConfirmationHeader}" message="#{mensajes.ConfirmCreateMessage}" icon="ui-icon-alert"/>
                    </p:commandButton>

                    <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('ExpNotificacionesCreateDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                </h:panelGroup>

            </h:form>

        </p:dialog>

    </ui:composition>

</html>
