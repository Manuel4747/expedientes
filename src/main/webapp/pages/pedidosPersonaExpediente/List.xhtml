<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui">

    <h:form id="PedidosPersonaCreateForm" enctype="multipart/form-data" >
        <div align="left">
            <div class="ui-g">
                <div class="ui-lg-2 ui-g-2">
                </div>
                <div class="ui-sm-12 ui-md-12 ui-lg-8 ui-g-8">
                    <div align="center">
                        <p:graphicImage library="manhattan-layout" style="width: 300px" value="/resources/images/imagen_logo.jpg"/>

                    </div>
                    <h:panelGroup id="display" >
                        <p:fieldset legend="PEDIDO DE USUARIO PARA EXPEDIENTE ELECTRÓNICO" style="margin-top: 10px;" >
                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_ci}" for="ci" />
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <h:panelGroup style="width: 100%">
                                    <p:inputNumber id="ci" style="font-size: 20px; height: 30px; width: 100%" decimalSeparator="," decimalPlaces="0" thousandSeparator="" maxValue="99999999" value="#{pedidosPersonaExpedienteController.selected.ci}" title="#{mensajes.CreatePedidosPersonaTitle_ci}" required="false" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_ci}">
                                        <p:ajax event="change" update=":growl, caracter, expediente, caracterRadio, botonGuardar, file1, file2, file3, file4, file5, email, telefono1, despachoPersonaRadio, nombresApellidos, despachoPersona, departamentoPersona, localidadPersona, descripcionDespachoPersona, descripcionDepartamentoPersona, descripcionLocalidadPersona" listener="#{pedidosPersonaExpedienteController.actualizarDatos()}" />
                                    </p:inputNumber>
                                </h:panelGroup>
                            </div>

                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel style="font-size: 20px" value="Carácter del solicitante"/>
                            </div>

                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                    <p:selectOneRadio id="caracterRadio" style="width: 100%" layout="pageDirection" value="#{pedidosPersonaExpedienteController.caracterRadio}" disabled="#{pedidosPersonaExpedienteController.deshabilitarNombresApellidos()}">
                                        <p:ajax event="change" update="file1, file2, file3, file4, file5, caracter, descripcionLocalidadPersona, localidadPersona, localidadPersonaRadio, despachoPersonaRadio, despachoPersona, descripcionDespachoPersona, departamentoPersonaRadio, departamentoPersona, descripcionDepartamentoPersona" listener="#{pedidosPersonaExpedienteController.actualizarCaracter()}"  />
                                        <f:selectItem itemLabel="Acusador Particular" itemValue="1"/>
                                        <f:selectItem itemLabel="Magistrado, Agente fiscal o Defensor público" itemValue="2"/>
                                        <f:selectItem itemLabel="Profesional interviniente" itemValue="3"/>
                                        <f:selectItem itemLabel="Otros" itemValue="4"/>
                                    </p:selectOneRadio>

                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                    <h:panelGroup style="height: 30px; width: 100%">
                                        <p:inputText id="caracter" disabled="#{pedidosPersonaExpedienteController.deshabilitarDescripcionCaracter()}" style="height: 30px; width: 100%" value="#{pedidosPersonaExpedienteController.selected.caracterSolicitante}" title="Carácter Solicitante" requiredMessage="Debe ingresar carácter del solicitante" maxlength="100"/>
                                    </h:panelGroup> 
                                </div>
                            </div>
                            
                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel style="font-size: 20px" value="#{mensajes.CreatePedidosPersonaLabel_nombresApellidos}" for="nombresApellidos" />
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <h:panelGroup style="height: 30px; width: 100%">
                                    <p:inputText id="nombresApellidos" onblur="value = value.toUpperCase()" style="height: 30px; text-transform:uppercase;width: 100%" disabled="#{pedidosPersonaExpedienteController.deshabilitarNombresApellidos()}" value="#{pedidosPersonaExpedienteController.selected.nombresApellidos}" title="#{mensajes.CreatePedidosPersonaTitle_nombresApellidos}" required="false" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_nombresApellidos}" maxlength="100"/>
                                </h:panelGroup>
                            </div>

                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel style="font-size: 20px" value="#{mensajes.CreatePedidosPersonaLabel_email}" for="email" />
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <h:panelGroup style="height: 30px; width: 100%">
                                    <p:inputText id="email" style="height: 30px; width: 100%" disabled="#{pedidosPersonaExpedienteController.deshabilitarNombresApellidos()}" value="#{pedidosPersonaExpedienteController.selected.email}" title="#{mensajes.CreatePedidosPersonaTitle_email}" required="false" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_email}" maxlength="100"/>
                                </h:panelGroup>
                            </div>

                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel style="font-size: 20px" value="#{mensajes.CreatePedidosPersonaLabel_telefono1}" for="telefono1" />
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <h:panelGroup style="height: 30px; width: 100%">
                                    <p:inputText id="telefono1" style="height: 30px; width: 100%" disabled="#{pedidosPersonaExpedienteController.deshabilitarNombresApellidos()}" value="#{pedidosPersonaExpedienteController.selected.telefono1}" title="#{mensajes.CreatePedidosPersonaTitle_telefono1}" required="false" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_telefono1}" maxlength="100"/>
                                </h:panelGroup>
                            </div>

                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <h:outputText style="font-size: 20px" value="Adjuntar foto de anverso cédula" />
                            </div>
                            <div class="ui-sm-12 ui-md-9 ui-g-9">
                                <p:panelGrid columns="2" style="height: 150px; width: 100%">
                                    <p:fileUpload id="file1" value="#{pedidosPersonaExpedienteController.file1}" mode="simple" accept=".jpg,.jpeg,.png" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser una imagen"  disabled="#{pedidosPersonaExpedienteController.deshabilitarArchivos()}" />
                                </p:panelGrid>
                            </div>

                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <h:outputText style="font-size: 20px" value="Adjuntar foto del reverso cédula" />
                            </div>
                            <div class="ui-sm-12 ui-md-9 ui-g-9">
                                <p:panelGrid columns="2" style="height: 150px; width: 100%">
                                    <p:fileUpload id="file4" value="#{pedidosPersonaExpedienteController.file4}" mode="simple" accept=".jpg,.jpeg,.png" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser una imagen"  disabled="#{pedidosPersonaExpedienteController.deshabilitarArchivos()}" />
                                </p:panelGrid>
                            </div>
                            
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <h:outputText style="font-size: 20px" value="Adjuntar foto de anverso matrícula de abogado" />
                            </div>
                            <div class="ui-sm-12 ui-md-9 ui-g-9">
                                <p:panelGrid columns="2" style="height: 150px; width: 100%">
                                    <p:fileUpload id="file2" value="#{pedidosPersonaExpedienteController.file2}" mode="simple" accept=".jpg,.jpeg,.png" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser una imagen" disabled="#{pedidosPersonaExpedienteController.deshabilitarArchivoMatricula()}" />
                                </p:panelGrid>
                            </div>
                            
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <h:outputText style="font-size: 20px" value="Adjuntar foto del reverso matrícula de abogado" />
                            </div>
                            <div class="ui-sm-12 ui-md-9 ui-g-9">
                                <p:panelGrid columns="2" style="height: 150px; width: 100%">
                                    <p:fileUpload id="file5" value="#{pedidosPersonaExpedienteController.file5}" mode="simple" accept=".jpg,.jpeg,.png" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser una imagen" disabled="#{pedidosPersonaExpedienteController.deshabilitarArchivoMatricula()}" />
                                </p:panelGrid>
                            </div>
                            
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <h:outputText style="font-size: 20px" value="Adjuntar foto suya sosteniendo cédula o matrícula" />
                            </div>
                            <div class="ui-sm-12 ui-md-9 ui-g-9">
                                <p:panelGrid columns="2" style="height: 150px; width: 100%">
                                    <p:fileUpload id="file3" value="#{pedidosPersonaExpedienteController.file3}" mode="simple" accept=".jpg,.jpeg,.png" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser una imagen"  disabled="#{pedidosPersonaExpedienteController.deshabilitarArchivos()}" />
                                </p:panelGrid>
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel style="font-size: 20px" value="Expediente JEM al cual se quiere vincular" />
                            </div>

                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <p:inputTextarea id="expediente" rows="4" disabled="#{pedidosPersonaExpedienteController.deshabilitarNombresApellidos()}" style="font-size: 20px; width: 100%" value="#{pedidosPersonaExpedienteController.selected.expediente}" title="Expediente JEM al cual se quiere vincular"/>
                            </div>

                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel style="font-size: 20px" value="#{mensajes.CreatePedidosPersonaLabel_despachoPersona}" />
                            </div>

                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <div class="ui-sm-2 ui-md-2 ui-lg-2 ui-g-2">
                                    <p:selectOneRadio id="despachoPersonaRadio" style="height: 30px; width: 100%" layout="pageDirection" value="#{pedidosPersonaExpedienteController.despachoPersonaRadio}" disabled="#{pedidosPersonaExpedienteController.deshabilitarDatosMagistrados()}">
                                        <p:ajax event="change" update="despachoPersona, descripcionDespachoPersona" />
                                        <f:selectItem itemLabel="Elegir" itemValue="1"/>
                                        <f:selectItem itemLabel="O Escribir" itemValue="2"/>
                                    </p:selectOneRadio>

                                </div>
                                <div class="ui-sm-10 ui-md-10 ui-lg-10 ui-g-10">
                                    <h:panelGroup style="width: 100%" >
                                        <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%" >
                                            <p:selectOneMenu id="despachoPersona" editable="#{not pedidosPersonaExpedienteController.deshabilitarEdicionDespachoPersona}" disabled="#{pedidosPersonaExpedienteController.deshabilitarDespachoPersona()}" style="height: 30px; width: 100%" value="#{pedidosPersonaExpedienteController.selected.despachoPersona}"  converter="despachosPersonaConverter">
                                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                                <f:selectItems value="#{despachosPersonaController.items}"
                                                               var="despachoPersonaItem"
                                                               itemValue="#{despachoPersonaItem}"
                                                               itemLabel="#{despachoPersonaItem.descripcion}"
                                                               />

                                            </p:selectOneMenu>
                                        </p:panelGrid>
                                        <p:inputText id="descripcionDespachoPersona" disabled="#{pedidosPersonaExpedienteController.deshabilitarDescripcionDespachoPersona()}" style="width: 100%" value="#{pedidosPersonaExpedienteController.selected.descripcionDespachoPersona}" title="#{mensajes.CreatePedidosPersonaTitle_descripcionDespachoPersona}" required="false" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_descripcionDespachoPersona}" maxlength="100"/>
                                    </h:panelGroup> 
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel style="font-size: 20px" value="#{mensajes.CreatePedidosPersonaLabel_departamentoPersona}" />
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <div class="ui-sm-2 ui-md-2 ui-lg-2 ui-g-2">
                                    <p:selectOneRadio rendered="false" id="departamentoPersonaRadio" style="height: 30px; visibility: hidden; width: 100%" layout="pageDirection" value="#{pedidosPersonaExpedienteController.departamentoPersonaRadio}" disabled="#{pedidosPersonaExpedienteController.deshabilitarDatosMagistrados()}">
                                        <p:ajax event="change" update="departamentoPersona, descripcionDepartamentoPersona" />
                                        <f:selectItem itemValue="1"/>
                                        <f:selectItem itemValue="2"/>
                                    </p:selectOneRadio>
                                </div>
                                <div class="ui-sm-10 ui-md-10 ui-lg-10 ui-g-10">
                                    <h:panelGroup style="width: 100%">
                                        <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%">
                                            <p:selectOneMenu id="departamentoPersona" disabled="#{pedidosPersonaExpedienteController.deshabilitarDepartamentoPersona()}"  style="width: 100%" filter="true" filterMatchMode="contains" value="#{pedidosPersonaExpedienteController.selected.departamentoPersona}"  converter="departamentosPersonaConverter">
                                                <p:ajax event="change" update="localidadPersona" listener="#{pedidosPersonaExpedienteController.actualizarListaLocalidad()}" />
                                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                                <f:selectItems value="#{departamentosPersonaController.items}"
                                                               var="departamentoPersonaItem"
                                                               itemValue="#{departamentoPersonaItem}"
                                                               itemLabel="#{departamentoPersonaItem.descripcion}"
                                                               />

                                            </p:selectOneMenu>
                                        </p:panelGrid>
                                        <p:inputText id="descripcionDepartamentoPersona" rendered="false" disabled="#{pedidosPersonaExpedienteController.deshabilitarDescripcionDepartamentoPersona()}" style="width: 100%" value="#{pedidosPersonaExpedienteController.selected.descripcionDepartamentoPersona}" title="#{mensajes.CreatePedidosPersonaTitle_descripcionDepartamentoPersona}" required="false" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_descripcionDepartamentoPersona}" maxlength="100"/>
                                    </h:panelGroup>
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-3 ui-g-3">
                                <p:outputLabel style="font-size: 20px" value="#{mensajes.CreatePedidosPersonaLabel_localidadPersona}"/>
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-9 ui-g-9">
                                <div class="ui-sm-2 ui-md-2 ui-lg-2 ui-g-2">
                                    <p:selectOneRadio rendered="false" id="localidadPersonaRadio" style="height: 30px; visibility: hidden; width: 100%" layout="pageDirection" value="#{pedidosPersonaExpedienteController.localidadPersonaRadio}">
                                        <p:ajax event="change" update="localidadPersona, descripcionLocalidadPersona" />
                                        <f:selectItem itemValue="1"/>
                                        <f:selectItem itemValue="2"/>
                                    </p:selectOneRadio>
                                </div>
                                <div class="ui-sm-10 ui-md-10 ui-lg-10 ui-g-10">
                                    <h:panelGroup style="width: 100%">
                                        <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%">
                                            <p:selectOneMenu id="localidadPersona" disabled="#{pedidosPersonaExpedienteController.deshabilitarLocalidadPersona()}"  style="height: 30px; width: 100%" filter="true" filterMatchMode="contains" value="#{pedidosPersonaExpedienteController.selected.localidadPersona}" converter="localidadesPersonaConverter">
                                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                                <f:selectItems value="#{pedidosPersonaExpedienteController.listaLocalidades}"
                                                               var="localidadPersonaItem"
                                                               itemValue="#{localidadPersonaItem}"
                                                               itemLabel="#{localidadPersonaItem.descripcion}"
                                                               />

                                            </p:selectOneMenu>
                                        </p:panelGrid>
                                        <p:inputText id="descripcionLocalidadPersona" rendered="false" disabled="#{pedidosPersonaExpedienteController.deshabilitarDescripcionLocalidadPersona()}" style="width: 100%" value="#{pedidosPersonaExpedienteController.selected.descripcionDepartamentoPersona}" title="#{mensajes.CreatePedidosPersonaTitle_descripcionLocalidadPersona}" required="false" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_descripcionLocalidadPersona}" maxlength="100"/>
                                    </h:panelGroup>
                                </div>
                            </div>
                        </p:fieldset>
                    </h:panelGroup>
                </div>
                <div class="ui-lg-2 ui-g-2">
                </div>
                <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                    <div align="center">
                        <p:commandButton id="botonGuardar" ajax="false" actionListener="#{pedidosPersonaExpedienteController.saveNew()}" disabled="#{pedidosPersonaExpedienteController.deshabilitarBoton}" value="#{pedidosPersonaExpedienteController.leyenda}" update=":growl"/>

                        <p:commandButton actionListener="#{pedidosPersonaExpedienteController.volver()}"  value="Volver" update=":growl"/>
                    </div>
                </div>
            </div>
        </div>
        <ui:include src="/pages/confirmation.xhtml"/>
    </h:form>

</ui:composition>
