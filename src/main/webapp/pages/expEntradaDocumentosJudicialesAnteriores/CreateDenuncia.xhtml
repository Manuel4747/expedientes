<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog positionType="absolute" id="DocumentosCreateDenunciaDlg" widgetVar="DocumentosCreateDenunciaDialog" modal="true" resizable="false" appendTo="@(body)" header="#{mensajes.CreateDenunciaTitle}" closeOnEscape="true">

            <h:form id="DocumentosCreateDenunciaForm2" enctype="multipart/form-data">
                <h:panelGroup id="display2" rendered="#{documentosJudicialesAnterioresController.selected != null}">
                    <p:panelGrid columns="2" columnClasses="column">
                        <h:outputText value="Adjuntar Primer Escrito" />
                        <p:panelGrid columns="2">
                            <p:fileUpload value="#{documentosJudicialesAnterioresController.file}" mode="simple" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser un pdf" allowTypes="/(\.|\/)(pdf)$/" disabled="false" />
                        </p:panelGrid>
                    </p:panelGrid>
                    <p:commandButton id="botonGuardar" widgetVar="botonGuardarWV" style="visibility: hidden;" styleClass="myButtonToClick" rendered="true" value="#{mensajes.Save}" icon="ui-icon-arrow-u" ajax="false" onclick="botonGuardar.disable(); monitorExporting(startHandler(0), endHandler)" update="display,:DocumentosJudicialesListForm:datalist,:growl" action="#{documentosJudicialesAnterioresController.saveNewExpediente()}" disabled="false"/>
                </h:panelGroup>
            </h:form>

            <h:form id="DocumentosCreateDenunciaForm" enctype="multipart/form-data">

                <h:panelGroup id="display" rendered="#{documentosJudicialesAnterioresController.selected != null}">
                    <p:panelGrid columns="2" columnClasses="column">
                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_personaDenunciante}" for="personaDenunciante" />
                        <h:panelGroup>
                            <p:selectOneMenu filter="true" disabled="true" filterMatchMode="contains" id="personaDenunciante" value="#{documentosJudicialesAnterioresController.personaOrigen}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_personaDenunciante}" converter="personasConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{personasController.items}"
                                               var="personaItem"
                                               itemValue="#{personaItem}"
                                               itemLabel="#{personaItem.ci} - #{personaItem.nombresApellidos}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="personaDenunciante" value="#{documentosJudicialesAnterioresController.getComponentMessages('personaDenunciante', mensajes.CreateDocumentosJudicialesHelpText_personaDenunciante)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_fechaPresentacion}" for="fechaPresentacion" />
                        <h:panelGroup>
                            <p:calendar id="fechaPresentacion" disabled="true" required="false" pattern="dd/MM/yyyy"  yearRange="c-100:c+0" navigator="true" timeZone="America/Asuncion" value="#{documentosJudicialesAnterioresController.selected.fechaPresentacion}" title="#{mensajes.CreateDocumentosJudicialesTitle_fechaPresentacion}" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_fechaPresentacion}" showOn="button"/>
                            <p:tooltip for="fechaPresentacion" value="#{documentosJudicialesAnterioresController.getComponentMessages('fechaPresentacion', mensajes.CreateDocumentosJudicialesHelpText_fechaPresentacion)}"/>
                        </h:panelGroup>

                        <ui:remove>
                            <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_tipoExpediente}" for="tipoExpediente" />
                            <h:panelGroup>
                                <p:inputText id="tipoExpediente" disabled="true" value="#{documentosJudicialesAnterioresController.selected.tipoExpediente.descripcion}" title="#{mensajes.CreateDocumentosJudicialesTitle_tipoExpediente}" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_tipoExpediente}" size="50" maxlength="50"/>
                                <p:tooltip for="tipoExpediente" value="#{documentosJudicialesAnterioresController.getComponentMessages('tipoExpediente', mensajes.CreateDocumentosJudicialesHelpText_tipoExpediente)}"/>
                            </h:panelGroup>
                        </ui:remove>

                        <p:outputLabel value="Expediente Judicial / Carpeta Fiscal" for="motivoProceso" />
                        <h:panelGroup>
                            <p:inputTextarea autoResize="false" rows="6" cols="100" id="motivoProceso" value="#{documentosJudicialesAnterioresController.selected.motivoProceso}" title="Expediente Judicial / Carpeta Fiscal" required="false" requiredMessage="Expediente Judicial / Carpeta Fiscal: campo requerido"/>
                            <p:tooltip for="motivoProceso" value="#{documentosJudicialesAnterioresController.getComponentMessages('motivoProceso', 'Ingrese Expediente Judicial / Carpeta Fiscal')}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_hechos}" for="hechos" />
                        <h:panelGroup>
                            <p:inputTextarea autoResize="false" rows="6"  cols="100" id="hechos" value="#{documentosJudicialesAnterioresController.selected.hechos}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_hechos}" title="#{mensajes.CreateDocumentosJudicialesTitle_hechos}"/>
                            <p:tooltip for="hechos" value="#{documentosJudicialesAnterioresController.getComponentMessages('hechos', mensajes.CreateDocumentosJudicialesHelpText_hechos)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_juzgado}" for="juzgado" />
                        <h:panelGroup>
                            <p:inputText id="juzgado" value="#{documentosJudicialesAnterioresController.selected.juzgado}" title="#{mensajes.CreateDocumentosJudicialesTitle_juzgado}" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_juzgado}" size="100" maxlength="100"/>
                            <p:tooltip for="juzgado" value="#{documentosJudicialesAnterioresController.getComponentMessages('juzgado', mensajes.CreateDocumentosJudicialesHelpText_juzgado)}"/>
                        </h:panelGroup>

                        <ui:remove>
                            <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_nroCausa}" for="nroCausa" />
                            <h:panelGroup>
                                <p:inputText id="nroCausa" value="#{documentosJudicialesAnterioresController.selected.causa}" title="#{mensajes.CreateDocumentosJudicialesTitle_nroCausa}" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_nroCausa}" size="50" maxlength="50"/>
                                <p:tooltip for="nroCausa" value="#{documentosJudicialesAnterioresController.getComponentMessages('nroCausa', mensajes.CreateDocumentosJudicialesHelpText_nroCausa)}"/>
                            </h:panelGroup>
                        </ui:remove>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_persona}" for="persona" />
                        <h:panelGroup>
                            <h:panelGrid columns="1" styleClass="ui-noborder" width="800px">
                                <p:panelGrid columns="2" styleClass="ui-noborder">
                                    <h:panelGroup>
                                        <p:selectOneMenu filter="true" filterMatchMode="contains" id="persona" value="#{documentosJudicialesAnterioresController.persona}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_persona}" converter="personasConverter">
                                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                            <f:selectItems value="#{personasController.items}"
                                                           var="personaItem"
                                                           itemValue="#{personaItem}"
                                                           itemLabel="#{personaItem.ci} - #{personaItem.nombresApellidos}"
                                                           />

                                        </p:selectOneMenu>
                                        <p:tooltip for="persona" value="#{documentosJudicialesAnterioresController.getComponentMessages('persona', mensajes.CreateDocumentosJudicialesHelpText_persona)}"/>
                                    </h:panelGroup>
                                    <p:commandButton id="agregarPersonaButton" value="Agregar" actionListener="#{documentosJudicialesAnterioresController.agregarPersona()}" update="datalistPersonas, DocumentosCreateDenunciaForm:caratula"/>
                                </p:panelGrid>
                                <p:dataTable id="datalistPersonas"
                                             value="#{documentosJudicialesAnterioresController.listaPersonasActivas}"
                                             lazy="false" emptyMessage="#{mensajes.NoRegistros}"
                                             rowKey="#{item.id}"
                                             var="item"
                                             tableStyle="width:auto"
                                             paginator="false"
                                             selectionMode="single"
                                             selection="#{documentosJudicialesAnterioresController.personaSelected}">

                                    <p:ajax event="rowSelect"   update="" />
                                    <p:ajax event="rowUnselect" update="" />

                                    <p:column>
                                        <h:outputText value="#{item.ci}"/>
                                    </p:column>

                                    <p:column>
                                        <h:outputText value="#{item.nombresApellidos}"/>
                                    </p:column>

                                    <p:column style="width:15px;">
                                        <p:commandButton id="borrarPersonaButton" value="Borrar" actionListener="#{documentosJudicialesAnterioresController.borrarPersona(item)}" update="datalistPersonas, DocumentosCreateDenunciaForm:caratula"/>
                                    </p:column>
                                </p:dataTable>
                            </h:panelGrid>
                        </h:panelGroup>


                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_caratula}" for="caratula" />
                        <h:panelGroup>
                            <p:inputTextarea autoResize="false" disabled="true" rows="6"  cols="100" id="caratula" value="#{documentosJudicialesAnterioresController.selected.caratula}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_caratula}" title="#{mensajes.CreateDocumentosJudicialesTitle_caratula}"/>
                            <p:tooltip for="caratula" value="#{documentosJudicialesAnterioresController.getComponentMessages('caratula', mensajes.CreateDocumentosJudicialesHelpText_caratula)}"/>
                        </h:panelGroup>

                        <ui:remove>
                            <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_caratulaAnterior}" for="caratulaAnterior" />
                            <h:panelGroup>
                                <p:inputTextarea autoResize="false" rows="6"  cols="100" id="caratulaAnterior" value="#{documentosJudicialesAnterioresController.selected.caratulaAnterior}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_caratulaAnterior}" title="#{mensajes.CreateDocumentosJudicialesTitle_caratulaAnterior}"/>
                                <p:tooltip for="caratulaAnterior" value="#{documentosJudicialesAnterioresController.getComponentMessages('caratulaAnterior', mensajes.CreateDocumentosJudicialesHelpText_caratulaAnterior)}"/>
                            </h:panelGroup>
                        </ui:remove>

                        <ui:remove>
                            <p:outputLabel value="Última Actuación" for="estadoProcesal" rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerEstadoProcesal()}" />
                            <h:panelGroup rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerEstadoProcesal()}">
                                <h:panelGroup>
                                    <p:inputTextarea id="estadoProcesal" autoResize="false" rows="6" cols="100" value="#{documentosJudicialesAnterioresController.selected.estadoProcesal}" required="false" requiredMessage="Última Actuación: campo requerido" title="Última Actuación"/>
                                    <p:tooltip for="estadoProcesal" value="#{documentosJudicialesAnterioresController.getComponentMessages('estadoProcesal', 'Ingrese Última Actuación')}"/>
                                </h:panelGroup>
                            </h:panelGroup>
                        </ui:remove>
                        <ui:remove>
                            <p:outputLabel value="Observacion" for="observacion" rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerObs()}" />
                            <h:panelGroup rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerObs()}">
                                <h:panelGroup>
                                    <p:inputTextarea id="observacion" autoResize="false" rows="6" cols="100" value="#{documentosJudicialesAnterioresController.selected.ultimaObservacion}" required="false" title="Observacion"/>
                                    <p:tooltip for="observacion" value="#{documentosJudicialesAnterioresController.getComponentMessages('observacion', 'Ingrese Observacion')}"/>
                                </h:panelGroup>
                            </h:panelGroup>
                        </ui:remove>
                        <ui:remove>
                            <p:outputLabel value="Observacion Antecedente" for="observacionAntecedente" rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerObsAntecedente()}" />
                            <h:panelGroup rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerObsAntecedente()}">
                                <h:panelGroup>
                                    <p:inputTextarea id="observacionAntecedente" autoResize="false" rows="6" cols="100" value="#{documentosJudicialesAnterioresController.selected.ultimaObservacionAntecedente}" required="false" title="Observacion Antecedente"/>
                                    <p:tooltip for="observacionAntecedente" value="#{documentosJudicialesAnterioresController.getComponentMessages('observacionAntecedente', 'Ingrese Observacion Antecedente')}"/>
                                </h:panelGroup>
                            </h:panelGroup>
                        </ui:remove>
                        <ui:remove>
                            <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_estadoProceso}" for="estadoProceso" />
                            <h:panelGroup>
                                <p:selectOneMenu rendered="true" filter="true" filterMatchMode="contains" id="estadoProceso" disabled="#{documentosJudicialesAnterioresController.deshabilitarEstadoProceso()}" value="#{documentosJudicialesAnterioresController.selected.estadoProceso}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_estadoProceso}" converter="estadosProcesoConverter">
                                    <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                    <f:selectItems value="#{estadosProcesoController.items}"
                                                   var="estadoProcesoItem"
                                                   itemValue="#{estadoProcesoItem}"
                                                   itemLabel="#{estadoProcesoItem.descripcion}"
                                                   />

                                </p:selectOneMenu>
                                <p:tooltip for="estadoProceso" value="#{documentosJudicialesAnterioresController.getComponentMessages('estadoProceso', mensajes.CreateDocumentosJudicialesHelpText_estadoProceso)}"/>
                            </h:panelGroup>
                        </ui:remove>
                        <ui:remove>
                            <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_mostrarWeb}" for="mostrarWeb" />
                            <h:panelGroup>
                                <p:selectOneMenu filter="true" filterMatchMode="contains" id="mostrarWeb" disabled="#{documentosJudicialesAnterioresController.deshabilitarMostrarWeb()}" value="#{documentosJudicialesAnterioresController.selected.mostrarWeb}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_mostrarWeb}" >
                                    <f:selectItem itemLabel="SI" itemValue="SI"/>
                                    <f:selectItem itemLabel="NO" itemValue="NO"/>
                                </p:selectOneMenu>
                                <p:tooltip for="mostrarWeb" value="#{documentosJudicialesAnterioresController.getComponentMessages('mostrarWeb', mensajes.CreateDocumentosJudicialesHelpText_mostrarWeb)}"/>
                            </h:panelGroup>
                        </ui:remove>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_presentoSolvencia}" for="presentoSolvencia" />
                        <h:panelGroup>
                            <h:selectBooleanCheckbox id="presentoSolvencia" value="#{documentosJudicialesAnterioresController.selected.presentoSolvencia}" />
                            <p:tooltip for="presentoSolvencia" value="#{documentosJudicialesAnterioresController.getComponentMessages('presentoSolvencia', mensajes.CreateDocumentosJudicialesHelpText_presentoSolvencia)}"/>
                        </h:panelGroup>

                    </p:panelGrid>
                    <p:commandButton actionListener="#{documentosJudicialesAnterioresController.validarSaveNew()}" value="#{mensajes.Save}" update="display,:DocumentosJudicialesListForm:datalist,:growl" oncomplete="handleSubmit2(xhr,status,args,PF('DocumentosCreateDenunciaDialog'),'myButtonToClick');">
                        <p:confirm header="#{mensajes.ConfirmationHeader}" message="#{mensajes.ConfirmCreateMessage}" icon="ui-icon-alert"/>
                    </p:commandButton>

                    <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('DocumentosCreateDenunciaDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                </h:panelGroup>

            </h:form>
        </p:dialog>

    </ui:composition>

</html>
