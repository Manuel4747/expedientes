    <ui:composition>
        <p:dialog positionType="absolute" id="DocumentosJudicialesEditDlg" widgetVar="DocumentosJudicialesEditDialog" modal="true" resizable="false"  appendTo="@(body)" header="#{mensajes.EditDocumentosJudicialesTitle}" closeOnEscape="true">

            <h:form id="DocumentosJudicialesEditForm2" enctype="multipart/form-data">
                <h:panelGroup id="display2" rendered="#{documentosJudicialesAnterioresController.selected != null}">
                    <p:panelGrid columns="2" columnClasses="column">
                        <h:outputText value="Adjuntar Documento" rendered="#{not documentosJudicialesAnterioresController.deshabilitarAdjuntar()}" />
                        <p:panelGrid columns="2"  rendered="#{not documentosJudicialesAnterioresController.deshabilitarAdjuntar()}">
                            <p:fileUpload value="#{documentosJudicialesAnterioresController.file}" mode="simple" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser un pdf" allowTypes="/(\.|\/)(pdf)$/" disabled="false" />
                        </p:panelGrid>
                    </p:panelGrid>
                    <p:commandButton id="botonGuardar" widgetVar="botonGuardarWV" style="visibility: hidden;" styleClass="myButtonToClickEdit" rendered="true" value="#{mensajes.Save}" icon="ui-icon-arrow-u" ajax="false" onclick="botonGuardar.disable(); monitorExporting(startHandler(0), endHandler)" update="#{documentosJudicialesAnterioresController.updateCreate()}" action="#{documentosJudicialesAnterioresController.save()}" disabled="false"/>
                </h:panelGroup>
            </h:form>
            <h:form id="DocumentosJudicialesEditForm" enctype="multipart/form-data">

                <h:panelGroup id="display">
                    <p:panelGrid  columns="2" columnClasses="column" rendered="#{documentosJudicialesAnterioresController.selected != null}">
                        <p:outputLabel value="#{mensajes.EditDocumentosJudicialesLabel_fechaPresentacion}" for="fechaPresentacion" />
                        <h:panelGroup>
                            <p:calendar id="fechaPresentacion" required="false" pattern="dd/MM/yyyy"  yearRange="c-100:c+0" navigator="true" timeZone="America/Asuncion" value="#{documentosJudicialesAnterioresController.selected.fechaPresentacion}" title="#{mensajes.EditDocumentosJudicialesTitle_fechaPresentacion}" requiredMessage="#{mensajes.EditDocumentosJudicialesRequiredMessage_fechaPresentacion}" showOn="button"/>
                            <p:tooltip for="fechaPresentacion" value="#{documentosJudicialesAnterioresController.getComponentMessages('fechaPresentacion', mensajes.EditDocumentosJudicialesHelpText_fechaPresentacion)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.EditDocumentosJudicialesLabel_nroCausa}" for="nroCausa" />
                        <h:panelGroup>
                            <p:inputText id="nroCausa" value="#{documentosJudicialesAnterioresController.selected.causa}" title="#{mensajes.EditDocumentosJudicialesTitle_nroCausa}" required="false" requiredMessage="#{mensajes.EditDocumentosJudicialesRequiredMessage_nroCausa}" size="50" maxlength="50"/>
                            <p:tooltip for="nroCausa" value="#{documentosJudicialesAnterioresController.getComponentMessages('nroCausa', mensajes.EditDocumentosJudicialesHelpText_nroCausa)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.EditDocumentosJudicialesLabel_tipoExpediente}" for="tipoExpediente" />
                        <h:panelGroup>
                            <p:selectOneMenu filter="true" filterMatchMode="contains" id="tipoExpediente" value="#{documentosJudicialesAnterioresController.tipoExpediente}" required="false" requiredMessage="#{mensajes.EditDocumentosJudicialesRequiredMessage_tipoExpediente}" converter="tiposExpedienteConverter">
                                <p:ajax event="change" update="tipoExpedienteAnterior, caratula, caratulaAnterior" listener="#{documentosJudicialesAnterioresController.actualizarDatosAnteriores()}" />
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{documentosJudicialesAnterioresController.listaTiposExpediente}"
                                               var="tipoExpedienteItem"
                                               itemValue="#{tipoExpedienteItem}"
                                               itemLabel="#{tipoExpedienteItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="tipoExpediente" value="#{documentosJudicialesAnterioresController.getComponentMessages('tipoExpediente', mensajes.EditDocumentosJudicialesHelpText_tipoExpediente)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.EditDocumentosJudicialesLabel_tipoExpedienteAnterior}" for="tipoExpedienteAnterior" />
                        <h:panelGroup>
                            <p:selectOneMenu filter="true" disabled="false" filterMatchMode="contains" id="tipoExpedienteAnterior" value="#{documentosJudicialesAnterioresController.tipoExpedienteAnterior}" required="false" requiredMessage="#{mensajes.EditDocumentosJudicialesRequiredMessage_tipoExpedienteAnterior}" converter="tiposExpedienteConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{documentosJudicialesAnterioresController.listaTiposExpediente}"
                                               var="tipoExpedienteItem"
                                               itemValue="#{tipoExpedienteItem}"
                                               itemLabel="#{tipoExpedienteItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="tipoExpedienteAnterior" value="#{documentosJudicialesAnterioresController.getComponentMessages('tipoExpedienteAnterior', mensajes.EditDocumentosJudicialesHelpText_tipoExpedienteAnterior)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.EditDocumentosJudicialesLabel_persona}" for="persona" />
                        <h:panelGroup>
                            <h:panelGrid columns="1" styleClass="ui-noborder" width="800px">
                                <p:panelGrid columns="2" styleClass="ui-noborder">
                                    <h:panelGroup>
                                        <p:selectOneMenu filter="true" filterMatchMode="contains" id="persona" value="#{documentosJudicialesAnterioresController.persona}" required="false" requiredMessage="#{mensajes.EditDocumentosJudicialesRequiredMessage_persona}" converter="personasConverter">
                                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                            <f:selectItems value="#{personasController.items}"
                                                           var="personaItem"
                                                           itemValue="#{personaItem}"
                                                           itemLabel="#{personaItem.ci} - #{personaItem.nombresApellidos}"
                                                           />

                                        </p:selectOneMenu>
                                        <p:commandButton id="agregarPersonaButton" value="Agregar" actionListener="#{documentosJudicialesAnterioresController.agregarPersona()}" update="datalistPersonas"/>
                                    </h:panelGroup>
                                </p:panelGrid>
                                <p:dataTable id="datalistPersonas"
                                             value="#{documentosJudicialesAnterioresController.listaPersonasActivas}"
                                             lazy="false" emptyMessage="#{mensajes.NoRegistros}"
                                             rowKey="#{item.id}"
                                             var="item"
                                             tableStyle="width:auto"
                                             paginator="false"
                                             selectionMode="single"
                                             selection="#{documentosJudicialesAnterioresController.personaSelected}">


                                    <p:ajax event="rowSelect"   update="" />
                                    <p:ajax event="rowUnselect" update="" />

                                    <p:column>
                                        <h:outputText value="#{item.ci}"/>
                                    </p:column>

                                    <p:column>
                                        <h:outputText value="#{item.nombresApellidos}"/>
                                    </p:column>

                                    <p:column>
                                        <p:selectBooleanCheckbox value="#{item.tipoExpedienteAnterior}" itemLabel="Caratula Anterior"/>
                                    </p:column>

                                    <p:column style="width:15px;">
                                        <p:commandButton id="borrarPersonaButton" value="Borrar" actionListener="#{documentosJudicialesAnterioresController.verificarResolucionesPersona(item)}" update="datalistPersonas"/>
                                    </p:column>
                                </p:dataTable>
                            </h:panelGrid>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.EditDocumentosJudicialesLabel_caratula}" for="caratula" />
                        <h:panelGroup>
                            <p:inputTextarea autoResize="false" rows="6" cols="100" id="caratula" value="#{documentosJudicialesAnterioresController.caratula}" required="false" requiredMessage="#{mensajes.EditDocumentosJudicialesRequiredMessage_caratula}" title="#{mensajes.EditDocumentosJudicialesTitle_caratula}"/>
                            <p:tooltip for="caratula" value="#{documentosJudicialesAnterioresController.getComponentMessages('caratula', mensajes.EditDocumentosJudicialesHelpText_caratula)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="Caratula Anterior" for="caratulaAnterior" />
                        <h:panelGroup>
                            <p:inputTextarea autoResize="false" disabled="false" rows="6" cols="100" id="caratulaAnterior" value="#{documentosJudicialesAnterioresController.caratulaAnterior}" required="false" title="#{mensajes.EditDocumentosJudicialesTitle_caratulaAnterior}"/>
                            <p:tooltip for="caratulaAnterior" value="#{documentosJudicialesAnterioresController.getComponentMessages('caratulaAnterior', mensajes.EditDocumentosJudicialesHelpText_caratulaAnterior)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="Expediente Judicial / Carpeta Fiscal" for="motivoProceso" />
                        <h:panelGroup>
                            <p:inputTextarea autoResize="false" rows="6" cols="100" id="motivoProceso" value="#{documentosJudicialesAnterioresController.selected.motivoProceso}" title="Expediente Judicial / Carpeta Fiscal" required="false" requiredMessage="Expediente Judicial / Carpeta Fiscal: campo requerido"/>
                            <p:tooltip for="motivoProceso" value="#{documentosJudicialesAnterioresController.getComponentMessages('motivoProceso', 'Ingrese Expediente Judicial / Carpeta Fiscal')}"/>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerEstadoProcesal()}">
                            <p:inputTextarea autoResize="false" rows="6" cols="100" id="estadoProcesal" value="#{documentosJudicialesAnterioresController.selected.estadoProcesalAux}" requiredMessage="Última Actuación: campo requerido" required="false" title="Última Actuación"/>
                            <p:tooltip for="estadoProcesal" value="#{documentosJudicialesAnterioresController.getComponentMessages('estadoProcesal', 'Ingrese Última Actuación')}"/>
                        </h:panelGroup>

                            <h:panelGroup>
                                <p:inputTextarea id="observacion" autoResize="false" rows="6" cols="100" value="#{documentosJudicialesAnterioresController.selected.ultimaObservacionAux}" required="false" requiredMessage="Observación: campo requerido" title="Observación"/>
                                <p:tooltip for="observacion" value="#{documentosJudicialesAnterioresController.getComponentMessages('observacion', 'Ingrese Observación')}"/>
                            </h:panelGroup>
                        </h:panelGroup>

                        <p:outputLabel value="ObservacionAntecedente" rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerObsAntecedente()}" for="observacionAntecedente" />
                        <h:panelGroup rendered="#{not documentosJudicialesAnterioresController.deshabilitarVerObsAntecedente()}">
                            <h:panelGroup>
                                <p:inputTextarea id="observacionAntecedente" autoResize="false" rows="6" cols="100" value="#{documentosJudicialesAnterioresController.selected.ultimaObservacionAntecedenteAux}" required="false" requiredMessage="Observación Antecedente: campo requerido" title="Observación Antecedente"/>
                                <p:tooltip for="observacionAntecedente" value="#{documentosJudicialesAnterioresController.getComponentMessages('observacionAntecedente', 'Ingrese Observación Antecedente')}"/>
                            </h:panelGroup>
                        </h:panelGroup>

                        <p:outputLabel rendered="true" value="#{mensajes.EditDocumentosJudicialesLabel_estadoProceso}" for="estadoProceso" />
                        <h:panelGroup>
                            <p:selectOneMenu rendered="true" filter="true" filterMatchMode="contains" id="estadoProceso" disabled="#{documentosJudicialesAnterioresController.deshabilitarEstadoProceso()}" value="#{documentosJudicialesAnterioresController.estadoProceso}" required="false" requiredMessage="#{mensajes.EditDocumentosJudicialesRequiredMessage_estadoProceso}" converter="estadosProcesoConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{estadosProcesoController.items}"
                                               var="estadoProcesoItem"
                                               itemValue="#{estadoProcesoItem}"
                                               itemLabel="#{estadoProcesoItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="estadoProceso" value="#{documentosJudicialesAnterioresController.getComponentMessages('estadoProceso', mensajes.EditDocumentosJudicialesHelpText_estadoProceso)}"/>
                        </h:panelGroup>
                        
                        <p:outputLabel rendered="true" value="#{mensajes.EditDocumentosJudicialesLabel_mostrarWeb}" for="mostrarWeb" />
                        <h:panelGroup>
                            <p:selectOneMenu filter="true" filterMatchMode="contains" id="mostrarWeb" disabled="#{documentosJudicialesAnterioresController.deshabilitarMostrarWeb()}" value="#{documentosJudicialesAnterioresController.selected.mostrarWeb}" required="false" requiredMessage="#{mensajes.EditDocumentosJudicialesRequiredMessage_mostrarWeb}" >
                                <f:selectItem itemLabel="SI" itemValue="SI"/>
                                <f:selectItem itemLabel="NO" itemValue="NO"/>
                            </p:selectOneMenu>
                            <p:tooltip for="mostrarWeb" value="#{documentosJudicialesAnterioresController.getComponentMessages('mostrarWeb', mensajes.EditDocumentosJudicialesHelpText_mostrarWeb)}"/>
                        </h:panelGroup>

                    </p:panelGrid>
                    <p:commandButton id="botonGuardar" rendered="false" value="#{mensajes.Save}" icon="ui-icon-arrow-u" ajax="false" onclick="botonGuardar.disable(); monitorExporting(startHandler(0), endHandler)" update="display,:DocumentosJudicialesListForm:datalist,:growl" action="#{documentosJudicialesAnterioresController.save()}" />
                    <p:commandButton  id="botonGuardar2" onclick="botonGuardar2.disable()" rendered="false" value="#{mensajes.Save}" icon="ui-icon-arrow-u" ajax="true"  oncomplete="handleSubmit(xhr,status,args,PF('DocumentosEditDialog'));" update="display,:DocumentosJudicialesListForm:datalist,:growl" actionListener="#{documentosJudicialesAnterioresController.save()}" />
                    <p:commandButton actionListener="#{documentosJudicialesAnterioresController.validarSave()}" value="#{mensajes.Save}" update="display,:DocumentosJudicialesListForm:datalist,:growl" oncomplete="handleSubmit2(xhr,status,args,PF('DocumentosJudicialesEditDialog'),'myButtonToClickEdit');">
                        <p:confirm header="#{mensajes.ConfirmationHeader}" message="#{mensajes.ConfirmCreateMessage}" icon="ui-icon-alert"/>
                    </p:commandButton>
                    <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('DocumentosJudicialesEditDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                </h:panelGroup>

            </h:form>

        </p:dialog>

    </ui:composition>

</html>
