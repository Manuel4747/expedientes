<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>
        <div class="ui-g">
            <p:dialog positionType="absolute" position="0,0" id="DocumentosCreateInvestigacionPreliminarDlg" widgetVar="DocumentosCreateInvestigacionPreliminarDialog" modal="true" resizable="false" appendTo="@(body)" header="#{mensajes.CreateAcusacionTitle}" closeOnEscape="true">

                <h:form id="DocumentosCreateInvestigacionPreliminarForm" enctype="multipart/form-data">

                    <h:panelGroup id="display" rendered="#{documentosJudicialesAnterioresController.selected != null}">
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:fieldset legend="#{mensajes.CreateExpActuacionesLabel_caratula}" style="width: 100%">
                                <p:panelGrid columns="1" style="width: 100%;" styleClass="ui-noborder">
                                    <p:inputTextarea style="width: 100%; margin-right: 20px" autoResize="false" rows="2"  cols="50" id="caratula" value="#{documentosJudicialesAnterioresController.selected.caratula}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_caratula}" title="#{mensajes.CreateDocumentosJudicialesTitle_caratula}"/>
                                </p:panelGrid>
                            </p:fieldset>
                        </div>
                        <div class="ui-sm-12 ui-md-6 ui-g-6">
                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:fieldset style="width: 100%">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <h:outputText style="font-size: 20px" value="#{mensajes.CreateDocumentosJudicialesLabel_tipoExpediente}" />
                                    </div>
                                    <div class="ui-sm-12 ui-md-9 ui-g-9">
                                        <p:panelGrid columns="1" style="width: 100%;" styleClass="ui-noborder">
                                            <p:selectOneMenu filter="true" filterMatchMode="contains" style="width: 100%" id="tipoExpediente" value="#{documentosJudicialesAnterioresController.selected.tipoExpediente}" converter="tiposExpedienteConverter">
                                                <f:selectItems value="#{documentosJudicialesAnterioresController.listaTiposExpediente}"
                                                               var="tipoExpedienteItem"
                                                               itemValue="#{tipoExpedienteItem}"
                                                               itemLabel="#{tipoExpedienteItem.descripcion}"
                                                               />

                                            </p:selectOneMenu>
                                        </p:panelGrid>
                                    </div>
                                </p:fieldset>
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:fieldset style="width: 100%">
                                    <div class="ui-sm-12 ui-md-4 ui-g-4">

                                    </div>
                                    <div class="ui-sm-12 ui-md-8 ui-g-8">
                                        <h:outputText style="font-size: 20px; color: #ff0000" value="El archivo no debe tener un tamaño mayor a 10 Mb" />
                                    </div>
                                    <div class="ui-sm-12 ui-md-4 ui-g-4">
                                        <h:outputLabel style="font-size: 20px" value="Adjuntar Escrito Acusación"/>
                                    </div>
                                    <div class="ui-sm-10 ui-md-8 ui-g-8">
                                        <p:fileUpload value="#{documentosJudicialesAnterioresController.file}" mode="simple" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser un pdf" allowTypes="/(\.|\/)(pdf)$/" disabled="false" />
                                    </div>
                                </p:fieldset>
                            </div>

                            <ui:remove>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <p:fieldset style="width: 100%">
                                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                                            <h:outputText style="font-size: 20px" value="#{mensajes.CreateDocumentosJudicialesLabel_personaAcusadora}" />
                                        </div>
                                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                <div class="ui-sm-12 ui-md-3 ui-g-3">
                                                    <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                        <h:outputText style="width: 100%" value="Cédula"/>                                                
                                                    </div>
                                                    <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                        <h:inputText style="width: 100%; height: 20px" id="ci" value="#{documentosJudicialesAnterioresController.cedula}" title="Cedula" required="false" requiredMessage="Cedula: campo requerido">
                                                            <p:ajax listener="#{documentosJudicialesAnterioresController.buscarPersona()}" update="nombre" />
                                                        </h:inputText>
                                                    </div>
                                                </div>
                                                <div class="ui-sm-12 ui-md-6 ui-g-6">
                                                    <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                        <h:outputText style="width: 100%" value="Nombres y Apellidos"/>                                                
                                                    </div>
                                                    <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                        <h:inputText style="width: 100%; height: 20px" id="nombre" value="#{documentosJudicialesAnterioresController.nombresApellidos}" disabled="#{documentosJudicialesAnterioresController.deshabilitarNombresApellidos()}" title="Nombre" required="false" requiredMessage="Nombre: campo requerido"/>                                                
                                                    </div>
                                                </div>
                                                <div class="ui-sm-12 ui-md-3 ui-g-3">
                                                    <div class="ui-sm-12 ui-md-12 ui-g-12">

                                                    </div>
                                                    <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                        <p:commandButton style="width: 100%; margin-left: 20px" id="agregarPersonaOrigenButton" value="Agregar" actionListener="#{documentosJudicialesAnterioresController.agregarNuevaPersonaOrigenInvestigacionPreliminar()}" update="datalistPersonasOrigen, DocumentosCreateInvestigacionPreliminarForm:caratula, DocumentosCreateInvestigacionPreliminarForm:nombre, DocumentosCreateInvestigacionPreliminarForm:ci"/>

                                                    </div>
                                                </div>
                                            </div>
                                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                <p:dataTable id="datalistPersonasOrigen"
                                                             value="#{documentosJudicialesAnterioresController.listaPersonasOrigenActivas}"
                                                             lazy="false" emptyMessage="#{mensajes.NoRegistros}"
                                                             rowKey="#{item.id}"
                                                             var="item"
                                                             tableStyle="width:auto"
                                                             paginator="false"
                                                             selectionMode="single"
                                                             selection="#{documentosJudicialesAnterioresController.personaOrigenSelected}">

                                                    <p:ajax event="rowSelect"   update="" />
                                                    <p:ajax event="rowUnselect" update="" />

                                                    <p:column>
                                                        <h:outputText value="#{item.ci}"/>
                                                    </p:column>

                                                    <p:column>
                                                        <h:outputText value="#{item.nombresApellidos}"/>
                                                    </p:column>

                                                    <p:column>
                                                        <p:commandButton id="borrarPersonaButton" value="Borrar" actionListener="#{documentosJudicialesAnterioresController.borrarPersonaOrigenInvestigacionPreliminar(item)}" update="datalistPersonasOrigen, DocumentosCreateInvestigacionPreliminarForm:caratula"/>
                                                    </p:column>
                                                </p:dataTable>
                                            </div>
                                        </div>
                                    </p:fieldset>
                                </div>
                            </ui:remove>
                            <ui:remove>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <p:fieldset style="width: 100%">
                                        <div class="ui-sm-12 ui-md-3 ui-g-3">
                                            <h:outputText style="font-size: 20px" value="#{mensajes.CreateDocumentosJudicialesLabel_abogadoAcusador}" />
                                        </div>
                                        <div class="ui-sm-12 ui-md-9 ui-g-9">
                                            <p:panelGrid columns="1" style="width: 100%;" styleClass="ui-noborder">
                                                <p:selectOneMenu filter="true" filterMatchMode="contains" style="width: 100%" disabled="false" id="abogadoAcusador" value="#{documentosJudicialesAnterioresController.abogadoOrigen}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_abogadoAcusador}" converter="personasConverter">
                                                    <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                                    <f:selectItems value="#{personasController.items}"
                                                                   var="personaItem"
                                                                   itemValue="#{personaItem}"
                                                                   itemLabel="#{personaItem.ci} - #{personaItem.nombresApellidos}"
                                                                   />

                                                </p:selectOneMenu>
                                            </p:panelGrid>
                                        </div>
                                    </p:fieldset>
                                </div>
                            </ui:remove>
                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:fieldset style="width: 100%">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <h:outputText style="font-size: 20px" value="Expediente judicial / Cuaderno de investigación fiscal" />
                                    </div>
                                    <div class="ui-sm-12 ui-md-9 ui-g-9">
                                        <h:panelGroup style="width: 100%">
                                            <p:inputTextarea autoResize="false" style="width: 100%" rows="2" cols="50" id="motivoProceso" value="#{documentosJudicialesAnterioresController.selected.motivoProceso}" title="Expediente Judicial / Cuaderno de Investigacion Fiscal" required="false" requiredMessage="Expediente Judicial / Cuaderno de Investigacion Fiscal: campo requerido"/>
                                        </h:panelGroup>
                                    </div>
                                </p:fieldset>
                            </div>
                        </div>

                        <div class="ui-sm-12 ui-md-6 ui-g-6">
                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:fieldset style="width: 100%">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <h:outputText style="font-size: 20px" value="#{mensajes.CreateExpActuacionesLabel_fojas}" />
                                    </div>
                                    <div class="ui-sm-12 ui-md-9 ui-g-9">
                                        <p:panelGrid style="width: 100%">
                                            <p:inputNumber id="fojas" value="#{documentosJudicialesAnterioresController.fojas}" title="#{mensajes.CreateExpActuacionesTitle_fojas}" required="false" requiredMessage="#{mensajes.CreateExpActuacionesRequiredMessage_fojas}" size="10" decimalPlaces="0" thousandSeparator="" decimalSeparator="," maxValue="9999"/>
                                        </p:panelGrid>
                                    </div>
                                </p:fieldset>
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:fieldset style="width: 100%">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <h:outputText style="font-size: 20px" value="#{mensajes.CreateDocumentosJudicialesLabel_fechaPresentacion}" />
                                    </div>
                                    <div class="ui-sm-12 ui-md-9 ui-g-9">
                                        <p:panelGrid columns="1" style="width: 100%" styleClass="ui-noborder">
                                            <h:panelGroup style="width: 100%;">
                                                <p:calendar id="fechaPresentacion" size="7" disabled="true" required="false" pattern="dd/MM/yyyy"  yearRange="c-100:c+0" navigator="true" timeZone="America/Asuncion" value="#{documentosJudicialesAnterioresController.selected.fechaPresentacion}" title="#{mensajes.CreateDocumentosJudicialesTitle_fechaPresentacion}" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_fechaPresentacion}" showOn="button"/>
                                            </h:panelGroup>
                                        </p:panelGrid>
                                    </div>
                                </p:fieldset>
                            </div>
                            <ui:remove>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">

                                    <p:fieldset style="width: 100%">
                                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                                            <h:outputText style="font-size: 20px" value="#{mensajes.CreateDocumentosJudicialesLabel_persona}" />
                                        </div>
                                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                <div class="ui-sm-12 ui-md-9 ui-g-9">
                                                    <p:selectOneMenu filter="true" style="width: 100%" filterMatchMode="contains" id="persona" value="#{documentosJudicialesAnterioresController.persona}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_persona}" converter="personasConverter">
                                                        <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                                        <f:selectItems value="#{personasController.items}"
                                                                       var="personaItem"
                                                                       itemValue="#{personaItem}"
                                                                       itemLabel="#{personaItem.ci} - #{personaItem.nombresApellidos}"
                                                                       />

                                                    </p:selectOneMenu>
                                                </div>
                                                <div class="ui-sm-12 ui-md-3 ui-g-3">
                                                    <p:commandButton id="agregarPersonaButton" style="width: 100%; margin-left: 20px" value="Agregar" actionListener="#{documentosJudicialesAnterioresController.agregarPersonaInvestigacionPreliminar()}" update="datalistPersonas, DocumentosCreateInvestigacionPreliminarForm:caratula"/>
                                                </div>
                                            </div>
                                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                                <p:dataTable id="datalistPersonas"
                                                             value="#{documentosJudicialesAnterioresController.listaPersonasActivas}"
                                                             lazy="false" emptyMessage="#{mensajes.NoRegistros}"
                                                             rowKey="#{item.id}"
                                                             var="item"
                                                             tableStyle="width:auto"
                                                             paginator="false"
                                                             selectionMode="single"
                                                             selection="#{documentosJudicialesAnterioresController.personaSelected}">

                                                    <p:ajax event="rowSelect"   update="" />
                                                    <p:ajax event="rowUnselect" update="" />

                                                    <p:column>
                                                        <h:outputText value="#{item.ci}"/>
                                                    </p:column>

                                                    <p:column>
                                                        <h:outputText value="#{item.nombresApellidos}"/>
                                                    </p:column>

                                                    <p:column>
                                                        <p:commandButton id="borrarPersonaButton" value="Borrar" actionListener="#{documentosJudicialesAnterioresController.borrarPersonaInvestigacionPreliminar(item)}" update="datalistPersonas, DocumentosCreateInvestigacionPreliminarForm:caratula"/>
                                                    </p:column>
                                                </p:dataTable>
                                            </div>
                                        </div>
                                    </p:fieldset>
                                </div>
                            </ui:remove>
                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:fieldset style="width: 100%">
                                    <div class="ui-sm-12 ui-md-12 ui-g-12">
                                        <h:outputText style="font-size: 20px" value="#{mensajes.CreateDocumentosJudicialesLabel_juzgado}" />
                                    </div>
                                    <div class="ui-sm-12 ui-md-12 ui-g-12">
                                        <h:panelGroup style="width: 100%" >
                                            <p:inputTextarea autoResize="false" rows="2" cols="50" id="juzgado" style="width: 100%" value="#{documentosJudicialesAnterioresController.selected.juzgado}" title="#{mensajes.CreateDocumentosJudicialesTitle_juzgado}" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_juzgado}" maxlength="100"/>
                                        </h:panelGroup>
                                    </div>
                                </p:fieldset>
                            </div>
                        </div>

                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:commandButton id="botonGuardar" onclick="botonGuardar.disable()" action="#{documentosJudicialesAnterioresController.saveNewExpedienteInvestigacionPreliminar()}" ajax="true" value="#{mensajes.Save}" update="display,:DocumentosJudicialesListForm:datalist,:growl" oncomplete="handleSubmit(xhr,status,args,PF('DocumentosCreateInvestigacionPreliminarDialog'));">
                                <f:ajax execute="@all" render="@form" onevent="endHandler();" onerror="endHandler();"/>
                            </p:commandButton>

                            <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('DocumentosCreateInvestigacionPreliminarDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                        </div>
                    </h:panelGroup>
                </h:form>
            </p:dialog>
        </div>

    </ui:composition>

</html>
