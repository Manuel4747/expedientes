<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition template="/WEB-INF/template.xhtml">
        <ui:define name="title">
            <h:outputText value="#{mensajes.AppName}"></h:outputText>
        </ui:define>
        <ui:define name="body">
            <h:form id="ChartsForm">
                    <div class="ui-g">
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <div class="ui-sm-12 ui-md-6 ui-lg-1 ui-g-1">
                                <div align="left">
                                    <p:outputLabel value="Desde" for="fechaDesde" style="padding-right: 5px;" />
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-6 ui-lg-2 ui-g-1">
                                <div align="left">
                                    <p:calendar size="7" id="fechaDesde" required="true" pattern="dd/MM/yyyy" navigator="true" value="#{chartsController.fechaDesde}" title="Fecha Desde"  showOn="button"/>
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-6 ui-lg-1 ui-g-1">
                                <div align="left">
                                    <p:outputLabel value="Hasta" for="fechaHasta" style="padding-right: 5px" />
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-6 ui-lg-2 ui-g-1">
                                <div align="left">
                                    <p:calendar size="7" id="fechaHasta" required="true" pattern="dd/MM/yyyy" navigator="true" value="#{chartsController.fechaHasta}" title="Fecha Hasta"  showOn="button"/>
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-4 ui-g-4">
                                <p:commandButton style="padding-right: 10px;" value="Buscar" ajax="false" onclick="monitorExporting(startHandler(0), endHandler)" action="#{chartsController.todos()}"></p:commandButton>
                            </div>
                        </div>

                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <div align="left">
                                    <p:panelGrid columns="2" columnClasses="column">
                                        <p:outputLabel value="Total Usuarios desde el inicio" style="padding-right: 5px; padding-left: 20px" />
                                        <p:outputLabel value="#{chartsController.usuariosCreados}" style="padding-right: 5px" />
                                    </p:panelGrid>
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <div align="right">
                                    <p:panelGrid columns="2" columnClasses="column">
                                        <p:outputLabel value="Total usuarios magistrados/abogados deste el inicio" style="padding-right: 5px; padding-left: 20px" />
                                        <p:outputLabel value="#{chartsController.magistradosTotal}" style="padding-right: 5px" />
                                    </p:panelGrid>
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <div align="left">
                                    <p:panelGrid columns="2" columnClasses="column">
                                        <p:outputLabel value="Total Usuarios en el rango de fechas" style="padding-right: 5px; padding-left: 20px" />
                                        <p:outputLabel value="#{chartsController.usuariosCreadosRango}" style="padding-right: 5px" />
                                    </p:panelGrid>
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <div align="right">
                                    <p:panelGrid columns="2" columnClasses="column">
                                        <p:outputLabel value="Total usuarios magistrados/abogados en el rango de fechas" style="padding-right: 5px; padding-left: 20px" />
                                        <p:outputLabel value="#{chartsController.magistradosTotalRango}" style="padding-right: 5px" />
                                    </p:panelGrid>
                                </div>
                            </div>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:panel id="modelUsuariosPorDiaBar" header="Usuarios Por dia" >
                                <p:barChart model="#{chartsController.modelUsuariosPorDiaBar}" style="width: 100%; height: 100%; min-height:  200px">
                                    <p:draggable for="modelUsuariosPorDiaBar" opacity="0.3" />
                                </p:barChart>
                            </p:panel>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <div align="left">
                                    <p:panelGrid columns="2" columnClasses="column">
                                        <p:outputLabel value="Total Expedientes Electrónicos desde el inicio" style="padding-right: 5px; padding-left: 20px" />
                                        <p:outputLabel value="#{chartsController.expedientesTotal}" style="padding-right: 5px" />
                                    </p:panelGrid>
                                </div>
                            </div>
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <div align="left">
                                    <p:panelGrid columns="2" columnClasses="column">
                                        <p:outputLabel value="Total Expedientes Electrónicos en el rango de fechas" style="padding-right: 5px; padding-left: 20px" />
                                        <p:outputLabel value="#{chartsController.expedientesTotalRango}" style="padding-right: 5px" />
                                    </p:panelGrid>
                                </div>
                            </div>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:panel id="modelExpedientesPorDiaBar" header="Total Expedientes Electrónicos" >
                                <p:barChart model="#{chartsController.modelExpedientesPorDiaBar}" style="width: 100%; height: 100%; min-height:  200px">
                                    <p:draggable for="modelExpedientesPorDiaBar" opacity="0.3" />
                                </p:barChart>
                            </p:panel>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:panel id="modelAntecedentesPorAnio" header="Antecedentes por Año" >
                                <p:barChart model="#{chartsController.modelAntecedentesPorAnio}" style="width: 100%; height: 100%; min-height:  200px">
                                    <p:draggable for="modelAntecedentesPorAnio" opacity="0.3" />
                                </p:barChart>
                            </p:panel>
                        </div>
                    </div>
            </h:form>
        </ui:define>

    </ui:composition>

</html>
