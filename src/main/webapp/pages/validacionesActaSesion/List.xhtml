<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui">

    <h:form id="ValidacionForm">

        <div align="left">
            <div class="ui-g">
                <div class="ui-lg-2 ui-g-2">
                </div>
                <div class="ui-sm-12 ui-md-12 ui-lg-8 ui-g-8">
                    <div align="center">
                        <p:graphicImage library="manhattan-layout" style="height: 150px" styleClass="login-image" value="/resources/images/imagen_logo.jpg"/>
                    </div>
                </div>
                <div class="ui-lg-2 ui-g-2">
                </div>
                <div class="ui-lg-4 ui-g-4">
                </div>
                <div class="ui-sm-12 ui-md-12 ui-lg-4 ui-g-4">
                    <h:panelGroup id="display" >
                        <p:fieldset legend="VALIDACION" style="margin-top: 10px;" >

                            <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                <p:outputLabel value="Descripcion de la actuacion" for="descripcion" />
                            </div>
                            <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                <h:outputText id="descripcion" style="width: 100%" value="#{validacionesActaSesionController.descripcion}" />
                            </div>
                            
                            <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                <h:outputText id="fecha" style="width: 100%" value="#{validacionesActaSesionController.fechaHora}" />
                            </div>
                        </p:fieldset>
                    </h:panelGroup>
                </div>
                <div class="ui-lg-4 ui-g-4">
                </div>
                <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                    <div align="center">
                        <p:commandButton ajax="false" onstart="startHandler(0);" oncomplete="endHandler();" onerror="endHandler();" value="Ver Documento" actionListener="#{validacionesActaSesionController.validar()}" style="margin-left: 10px"/>
                    </div>
                </div>
            </div>
        </div>
        <ui:include src="/pages/confirmation.xhtml"/>
    </h:form>

</ui:composition>
