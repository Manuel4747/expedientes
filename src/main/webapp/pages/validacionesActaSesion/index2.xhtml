<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      lang="en">

    <h:head>
        <f:facet name="first">
            <meta http-equiv="X-UA-Compatible" content="IE=edge" />
            <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
            <meta name="apple-mobile-web-app-capable" content="yes" />
        </f:facet>
        <title><ui:insert name="title">Default Title</ui:insert></title>
        <h:outputScript library="scripts" name="pfcrud.js"/>
        <h:outputScript library="scripts" name="funciones.js"/>
        <h:outputScript name="js/nanoscroller.js" library="manhattan-layout" />
        <h:outputScript name="js/layout.js" library="manhattan-layout" />
        <ui:insert name="head"/>
    </h:head>
    
    <h:body style="background-image: url('#{parametrosSistemaController.imagenFondo}') !important; background-size:100% 100%;">

        <p:dialog widgetVar="statusDialog" header="Procesando" modal="true" visible="false" draggable="false" closable="false" resizable="false" showHeader="true">
            <p:graphicImage value="/resources/img/loading.gif" />
        </p:dialog>

        <p:ajaxStatus  onstart="startHandler(2000);" oncomplete="endHandler();" onerror="endHandler();" />

        <p:growl id="growl" life="7000" globalOnly="true"></p:growl>
        <div class="layout-wrapper #{parametrosSistemaController.layoutStyleClass}">
            <div class="layout-main">
                <div class="layout-content">
        <h:form id="PedidosPersonaCreateForm">

            <h:panelGroup id="display" rendered="#{pedidosPersonaController.selected != null}">
                <p:panelGrid columns="2" columnClasses="column">

                    <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_ci}" for="ci" />
                    <h:panelGroup>
                        <p:inputText id="ci" value="#{pedidosPersonaController.selected.ci}" title="#{mensajes.CreatePedidosPersonaTitle_ci}" required="true" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_ci}" size="20" maxlength="20"/>
                        <p:tooltip for="ci" value="#{pedidosPersonaController.getComponentMessages('ci', mensajes.CreatePedidosPersonaHelpText_ci)}"/>
                    </h:panelGroup>

                    <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_nombresApellidos}" for="nombresApellidos" />
                    <h:panelGroup>
                        <p:inputText id="nombresApellidos" value="#{pedidosPersonaController.selected.nombresApellidos}" title="#{mensajes.CreatePedidosPersonaTitle_nombresApellidos}" required="true" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_nombresApellidos}" size="50" maxlength="100"/>
                        <p:tooltip for="nombresApellidos" value="#{pedidosPersonaController.getComponentMessages('nombresApellidos', mensajes.CreatePedidosPersonaHelpText_nombresApellidos)}"/>
                    </h:panelGroup>

                    <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_tipoPersona}" for="tipoPersona" />
                    <h:panelGroup>
                        <p:selectOneMenu id="tipoPersona" value="#{pedidosPersonaController.selected.tipoPersona}"  converter="tiposPersonaConverter">
                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                            <f:selectItems value="#{tiposPersonaController.items}"
                                           var="tipoPersonaItem"
                                           itemValue="#{tipoPersonaItem}"
                                           itemLabel="#{tipoPersonaItem.descripcion}"
                                           />

                        </p:selectOneMenu>
                        <p:tooltip for="tipoPersona" value="#{pedidosPersonaController.getComponentMessages('tipoPersona', mensajes.CreatePedidosPersonaHelpText_tipoPersona)}"/>
                    </h:panelGroup> 

                    <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_cargoPersona}" for="cargoPersona" />
                    <h:panelGroup>
                        <p:selectOneMenu id="cargoPersona" filter="true" filterMatchMode="contains" value="#{pedidosPersonaController.selected.cargoPersona}"  converter="cargosPersonaConverter">
                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                            <f:selectItems value="#{cargosPersonaController.items}"
                                           var="cargoPersonaItem"
                                           itemValue="#{cargoPersonaItem}"
                                           itemLabel="#{cargoPersonaItem.descripcion}"
                                           />

                        </p:selectOneMenu>
                        <p:tooltip for="cargoPersona" value="#{pedidosPersonaController.getComponentMessages('cargoPersona', mensajes.CreatePedidosPersonaHelpText_cargoPersona)}"/>
                    </h:panelGroup> 

                    <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_despachoPersona}" for="despachoPersona" />
                    <h:panelGroup>
                        <p:selectOneMenu id="despachoPersona" filter="true" filterMatchMode="contains" value="#{pedidosPersonaController.selected.despachoPersona}"  converter="despachosPersonaConverter">
                            <p:ajax event="change" update="departamentoPersona, localidadPersona" listener="#{pedidosPersonaController.actualizarDptoYLocalidad()}"/>
                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                            <f:selectItems value="#{despachosPersonaController.items}"
                                           var="despachoPersonaItem"
                                           itemValue="#{despachoPersonaItem}"
                                           itemLabel="#{despachoPersonaItem.descripcion}"
                                           />

                        </p:selectOneMenu>
                        <p:tooltip for="despachoPersona" value="#{pedidosPersonaController.getComponentMessages('despachoPersona', mensajes.CreatePedidosPersonaHelpText_despachoPersona)}"/>
                    </h:panelGroup> 

                    <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_departamentoPersona}" for="departamentoPersona" />
                    <h:panelGroup>
                        <p:selectOneMenu id="departamentoPersona" filter="true" filterMatchMode="contains" value="#{pedidosPersonaController.departamentoPersona}"  converter="departamentosPersonaConverter">
                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                            <f:selectItems value="#{departamentosPersonaController.items}"
                                           var="departamentoPersonaItem"
                                           itemValue="#{departamentoPersonaItem}"
                                           itemLabel="#{departamentoPersonaItem.descripcion}"
                                           />

                        </p:selectOneMenu>
                        <p:tooltip for="departamentoPersona" value="#{pedidosPersonaController.getComponentMessages('departamentoPersona', mensajes.CreatePedidosPersonaHelpText_departamentoPersona)}"/>
                    </h:panelGroup>

                    <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_localidadPersona}" for="localidadPersona" />
                    <h:panelGroup>
                        <p:selectOneMenu id="localidadPersona" filter="true" filterMatchMode="contains" value="#{pedidosPersonaController.localidadPersona}"  converter="localidadesPersonaConverter">
                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                            <f:selectItems value="#{localidadesPersonaController.items}"
                                           var="localidadPersonaItem"
                                           itemValue="#{localidadPersonaItem}"
                                           itemLabel="#{localidadPersonaItem.descripcion}"
                                           />

                        </p:selectOneMenu>
                        <p:tooltip for="localidadPersona" value="#{pedidosPersonaController.getComponentMessages('localidadPersona', mensajes.CreatePedidosPersonaHelpText_localidadPersona)}"/>
                    </h:panelGroup>

                    <ui:remove>
                        <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_estado}" for="estado" />
                        <h:panelGroup>
                            <p:inputText id="estado" value="#{pedidosPersonaController.selected.estado}" title="#{mensajes.CreatePedidosPersonaTitle_estado}" required="true" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_estado}" size="2" maxlength="2"/>
                            <p:tooltip for="estado" value="#{pedidosPersonaController.getComponentMessages('estado', mensajes.CreatePedidosPersonaHelpText_estado)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_fechaHoraAlta}" for="fechaHoraAlta" />
                        <h:panelGroup>
                            <p:calendar id="fechaHoraAlta" pattern="MM/dd/yyyy HH:mm:ss" value="#{pedidosPersonaController.selected.fechaHoraAlta}" title="#{mensajes.CreatePedidosPersonaTitle_fechaHoraAlta}" required="true" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_fechaHoraAlta}" showOn="button"/>
                            <p:tooltip for="fechaHoraAlta" value="#{pedidosPersonaController.getComponentMessages('fechaHoraAlta', mensajes.CreatePedidosPersonaHelpText_fechaHoraAlta)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_usuarioAlta}" for="usuarioAlta" />
                        <h:panelGroup>
                            <p:inputText id="usuarioAlta" value="#{pedidosPersonaController.selected.usuarioAlta}" title="#{mensajes.CreatePedidosPersonaTitle_usuarioAlta}" required="true" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_usuarioAlta}"/>
                            <p:tooltip for="usuarioAlta" value="#{pedidosPersonaController.getComponentMessages('usuarioAlta', mensajes.CreatePedidosPersonaHelpText_usuarioAlta)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_fechaHoraUltimoEstado}" for="fechaHoraUltimoEstado" />
                        <h:panelGroup>
                            <p:calendar id="fechaHoraUltimoEstado" pattern="MM/dd/yyyy HH:mm:ss" value="#{pedidosPersonaController.selected.fechaHoraUltimoEstado}" title="#{mensajes.CreatePedidosPersonaTitle_fechaHoraUltimoEstado}"  showOn="button"/>
                            <p:tooltip for="fechaHoraUltimoEstado" value="#{pedidosPersonaController.getComponentMessages('fechaHoraUltimoEstado', mensajes.CreatePedidosPersonaHelpText_fechaHoraUltimoEstado)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_usuarioUltimoEstado}" for="usuarioUltimoEstado" />
                        <h:panelGroup>
                            <p:calendar id="usuarioUltimoEstado" pattern="MM/dd/yyyy HH:mm:ss" value="#{pedidosPersonaController.selected.usuarioUltimoEstado}" title="#{mensajes.CreatePedidosPersonaTitle_usuarioUltimoEstado}"  showOn="button"/>
                            <p:tooltip for="usuarioUltimoEstado" value="#{pedidosPersonaController.getComponentMessages('usuarioUltimoEstado', mensajes.CreatePedidosPersonaHelpText_usuarioUltimoEstado)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreatePedidosPersonaLabel_empresa}" for="empresa" />
                        <h:panelGroup>
                            <p:selectOneMenu id="empresa" value="#{pedidosPersonaController.selected.empresa}" required="true" requiredMessage="#{mensajes.CreatePedidosPersonaRequiredMessage_empresa}" converter="empresasConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{empresasController.items}"
                                               var="empresaItem"
                                               itemValue="#{empresaItem}"
                                               itemLabel="#{empresaItem.id.toString()}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="empresa" value="#{pedidosPersonaController.getComponentMessages('empresa', mensajes.CreatePedidosPersonaHelpText_empresa)}"/>
                        </h:panelGroup>
                    </ui:remove>
                </p:panelGrid>
                <p:commandButton actionListener="#{pedidosPersonaController.saveNew()}" value="#{mensajes.Save}" update="display,:growl">
                    <p:confirm header="#{mensajes.ConfirmationHeader}" message="#{mensajes.ConfirmCreateMessage}" icon="ui-icon-alert"/>
                </p:commandButton>

                <p:commandButton value="#{mensajes.Cancel}" update="display" process="@this" immediate="true" resetValues="true"/>
            </h:panelGroup>
            <ui:include src="/pages/confirmation.xhtml"/>
        </h:form>
                    </div>
                <div class="layout-main-mask"></div>
                </div>
            </div>
        <p:ajaxStatus style="width:32px;height:32px;position:fixed;right:7px;bottom:7px">
            <f:facet name="start">
                <i class="fa fa-circle-o-notch fa-spin ajax-loader" aria-hidden="true"></i>
            </f:facet>

            <f:facet name="complete">
                <h:outputText value="" />
            </f:facet>
        </p:ajaxStatus>

        <h:outputStylesheet library="css" name="pfcrud.css"/>
        <h:outputStylesheet name="css/nanoscroller.css" library="manhattan-layout" />
        <h:outputStylesheet name="css/layout-#{parametrosSistemaController.theme}.css" library="manhattan-layout" />
    </h:body>

</html>
