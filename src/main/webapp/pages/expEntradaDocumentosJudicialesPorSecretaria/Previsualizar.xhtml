<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pe="http://primefaces.org/ui/extensions">

    <ui:composition>

        <div class="ui-g">
            <p:dialog id="PrevisualizarViewDlg" positionType="absolute" widgetVar="PrevisualizarViewDialog"  maximizable="true" modal="true" resizable="true"  appendTo="@(body)" header="#{mensajes.ViewExpActuacionesTitle}" closeOnEscape="true">
                <p:ajax event="close" listener="#{documentosJudicialesPorSecretariaController.prepareCerrarDialogoPrevisualizar()}" />
                <h:form id="PrevisualizarViewForm">
                    <div class="ui-sm-12 ui-md-12 ui-g-12" >
                        <p:commandButton value="#{mensajes.Close}" oncomplete="PF('PrevisualizarViewDialog').hide()" />
                        <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%">
                            <pe:documentViewer id="visualizacion" style="width: 100%; height: 800px;" value="#{documentosJudicialesPorSecretariaController.content}" />
                        </p:panelGrid>
                    </div>
                </h:form>

            </p:dialog>
        </div>

    </ui:composition>

</html>
