<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pe="http://primefaces.org/ui/extensions">

    <ui:composition>

        <div class="ui-g">
            <p:dialog id="CorregirFirmantesDlg" positionType="absolute" widgetVar="CorregirFirmantesDialog"  maximizable="true" modal="true" resizable="true"  appendTo="@(body)" header="Admin. firmantes" closeOnEscape="true">
                <h:form id="CorregirFirmantesForm">
                    <h:panelGroup id="display">

                        <div class="ui-sm-12 ui-md-3 ui-g-3">

                        </div>
                        <div class="ui-sm-12 ui-md-6 ui-g-6">
                            <p:fieldset style="width: 100%">
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <p:dataTable id="datalistCorregirFirmantes"
                                                 value="#{documentosJudicialesPorSecretariaController.listaCorregirFirmantes}"
                                                 lazy="false" emptyMessage="#{mensajes.NoRegistros}"
                                                 rowKey="#{item.id}"
                                                 var="item"
                                                 tableStyle="width:auto"
                                                 paginator="false">


                                        <p:ajax event="rowSelect"   update="" />
                                        <p:ajax event="rowUnselect" update="" />

                                        <p:column filterMatchMode="contains" filterBy="#{item.personaFirmante.ci}">
                                            <f:facet name="header">
                                                <h:outputText value="Cedula"/>
                                            </f:facet>
                                            <h:outputText value="#{item.personaFirmante.ci}"/>
                                        </p:column>

                                        <p:column filterMatchMode="contains" filterBy="#{item.personaFirmante.nombresApellidos}">
                                            <f:facet name="header">
                                                <h:outputText value="Nombre"/>
                                            </f:facet>
                                            <h:outputText value="#{item.personaFirmante.nombresApellidos}"/>
                                        </p:column>

                                        <ui:remove>
                                            <p:column>
                                                <f:facet name="header">
                                                    <h:outputText value="Revisado"/>
                                                </f:facet>
                                                <h:selectBooleanCheckbox value="#{item.revisadoNuevo}" />
                                            </p:column>

                                            <p:column >
                                                <f:facet name="header">
                                                    <h:outputText value="Fecha Hora Revisión"/>
                                                </f:facet>
                                                <h:outputText value="#{item.fechaHoraRevisado}">
                                                    <f:convertDateTime pattern="#{documentosJudicialesPorSecretariaController.datePattern3()}" timeZone="America/Asuncion" />
                                                </h:outputText>
                                            </p:column>
                                            <p:column>
                                                <f:facet name="header">
                                                    <h:outputText value="Revisión Por"/>
                                                </f:facet>
                                                <h:outputText value="#{item.personaRevisado}"/>
                                            </p:column>
                                        </ui:remove>

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Firmado"/>
                                            </f:facet>
                                            <h:outputText value="#{item.firmadoString}"/>
                                        </p:column>

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Fecha Hora Firma"/>
                                            </f:facet>
                                            <h:outputText value="#{item.fechaHoraFirma}">
                                                <f:convertDateTime pattern="#{documentosJudicialesPorSecretariaController.datePattern3()}" timeZone="America/Asuncion" />
                                            </h:outputText>
                                        </p:column>

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Anotar como pendiente"/>
                                            </f:facet>
                                            <p:commandButton id="anotarPendiente" value="Pendiente" update=":growl, datalistCorregirFirmantes, :ExpActuacionesViewForm:datalistActuaciones" action="#{documentosJudicialesPorSecretariaController.corregirPendiente(item)}" />
                                        </p:column>

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Anotar como firmado"/>
                                            </f:facet>
                                            <p:commandButton id="anotarFirmado" value="Firmado" update=":growl, datalistCorregirFirmantes, :ExpActuacionesViewForm:datalistActuaciones" action="#{documentosJudicialesPorSecretariaController.corregirFirmado(item)}" />
                                        </p:column>

                                    </p:dataTable>
                                </div>

                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <p:commandButton value="#{mensajes.Close}" oncomplete="PF('CorregirFirmantesDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                                </div>
                            </p:fieldset>
                        </div>
                    </h:panelGroup>

                </h:form>

            </p:dialog>
        </div>

    </ui:composition>

</html>
