<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog positionType="absolute" id="DocumentosCreateDlg" widgetVar="DocumentosCreateDialog" modal="true" resizable="false" appendTo="@(body)" header="#{mensajes.CreateDocumentosTitle}" closeOnEscape="true">

            <h:form id="DocumentosCreateForm" enctype="multipart/form-data">

                <h:panelGroup id="display" rendered="#{documentosJudicialesPorSecretariaController.selected != null}">
                    <p:panelGrid columns="2" columnClasses="column">

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_nroCausa}" for="nroCausa" />
                        <h:panelGroup>
                            <p:inputText id="nroCausa" required="true" value="#{documentosJudicialesPorSecretariaController.selected.causa}" title="#{mensajes.CreateDocumentosJudicialesTitle_nroCausa}" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_nroCausa}" size="50" maxlength="50"/>
                            <p:tooltip for="nroCausa" value="#{documentosJudicialesPorSecretariaController.getComponentMessages('nroCausa', mensajes.CreateDocumentosJudicialesHelpText_nroCausa)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_tipoExpediente}" for="tipoExpediente" />
                        <h:panelGroup>
                            <p:selectOneMenu filter="true" filterMatchMode="contains" id="tipoExpediente" value="#{documentosJudicialesPorSecretariaController.selected.tipoExpediente}" required="true" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_tipoExpediente}" converter="tiposExpedienteConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{documentosJudicialesPorSecretariaController.listaTiposExpediente}"
                                               var="tipoExpedienteItem"
                                               itemValue="#{tipoExpedienteItem}"
                                               itemLabel="#{tipoExpedienteItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="tipoExpediente" value="#{documentosJudicialesPorSecretariaController.getComponentMessages('tipoExpediente', mensajes.CreateDocumentosJudicialesHelpText_tipoExpediente)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_persona}" for="persona" />
                        <h:panelGroup>
                            <h:panelGrid columns="1" styleClass="ui-noborder" width="800px">
                                <p:panelGrid columns="2" styleClass="ui-noborder">
                                    <h:panelGroup>
                                        <p:selectOneMenu filter="true" filterMatchMode="contains" id="persona" value="#{documentosJudicialesPorSecretariaController.persona}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_persona}" converter="personasConverter">
                                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                            <f:selectItems value="#{personasController.items}"
                                                           var="personaItem"
                                                           itemValue="#{personaItem}"
                                                           itemLabel="#{personaItem.ci} - #{personaItem.nombresApellidos}"
                                                           />

                                        </p:selectOneMenu>
                                        <p:tooltip for="persona" value="#{documentosJudicialesPorSecretariaController.getComponentMessages('persona', mensajes.CreateDocumentosJudicialesHelpText_persona)}"/>
                                    </h:panelGroup>
                                     <p:commandButton id="agregarPersonaButton" value="Agregar" actionListener="#{documentosJudicialesPorSecretariaController.agregarPersona()}" update="datalistPersonas"/>
                                </p:panelGrid>
                                <p:dataTable id="datalistPersonas"
                                             value="#{documentosJudicialesPorSecretariaController.listaPersonas}"
                                             lazy="false" emptyMessage="#{mensajes.NoRegistros}"
                                             rowKey="#{item.id}"
                                             var="item"
                                             tableStyle="width:auto"
                                             paginator="false"
                                             selectionMode="single"
                                             selection="#{documentosJudicialesPorSecretariaController.personaSelected}">

                                    <p:ajax event="rowSelect"   update="" />
                                    <p:ajax event="rowUnselect" update="" />

                                    <p:column>
                                        <h:outputText value="#{item.ci}"/>
                                    </p:column>

                                    <p:column>
                                        <h:outputText value="#{item.nombresApellidos}"/>
                                    </p:column>

                                    <p:column style="width:15px;">
                                        <p:commandButton id="borrarPersonaButton" value="Borrar" actionListener="#{documentosJudicialesPorSecretariaController.borrarPersona(item)}" update="datalistPersonas"/>
                                    </p:column>
                                </p:dataTable>
                            </h:panelGrid>
                        </h:panelGroup>


                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_caratula}" for="caratula" />
                        <h:panelGroup>
                            <p:inputTextarea autoResize="false" disabled="false" rows="6"  cols="100" id="caratula" value="#{documentosJudicialesPorSecretariaController.selected.caratula}" required="false" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_caratula}" title="#{mensajes.CreateDocumentosJudicialesTitle_caratula}"/>
                            <p:tooltip for="caratula" value="#{documentosJudicialesPorSecretariaController.getComponentMessages('caratula', mensajes.CreateDocumentosJudicialesHelpText_caratula)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_estadoProceso}" for="estadoProceso" />
                        <h:panelGroup>
                            <p:selectOneMenu filter="true" filterMatchMode="contains" id="estadoProceso" disabled="#{documentosJudicialesPorSecretariaController.deshabilitarEstadoProceso()}" value="#{documentosJudicialesPorSecretariaController.selected.estadoProceso}" required="true" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_estadoProceso}" converter="estadosProcesoConverter">
                                <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                <f:selectItems value="#{estadosProcesoController.items}"
                                               var="estadoProcesoItem"
                                               itemValue="#{estadoProcesoItem}"
                                               itemLabel="#{estadoProcesoItem.descripcion}"
                                               />

                            </p:selectOneMenu>
                            <p:tooltip for="estadoProceso" value="#{documentosJudicialesPorSecretariaController.getComponentMessages('estadoProceso', mensajes.CreateDocumentosJudicialesHelpText_estadoProceso)}"/>
                        </h:panelGroup>

                        <p:outputLabel value="#{mensajes.CreateDocumentosJudicialesLabel_mostrarWeb}" for="mostrarWeb" />
                        <h:panelGroup>
                            <p:selectOneMenu filter="true" filterMatchMode="contains" id="mostrarWeb" disabled="#{documentosJudicialesPorSecretariaController.deshabilitarMostrarWeb()}" value="#{documentosJudicialesPorSecretariaController.selected.mostrarWeb}" required="true" requiredMessage="#{mensajes.CreateDocumentosJudicialesRequiredMessage_mostrarWeb}" >
                                <f:selectItem itemLabel="SI" itemValue="SI"/>
                                <f:selectItem itemLabel="NO" itemValue="NO"/>
                            </p:selectOneMenu>
                            <p:tooltip for="mostrarWeb" value="#{documentosJudicialesPorSecretariaController.getComponentMessages('mostrarWeb', mensajes.CreateDocumentosJudicialesHelpText_mostrarWeb)}"/>
                        </h:panelGroup>
                        
                    </p:panelGrid>

                    <p:commandButton actionListener="#{documentosJudicialesPorSecretariaController.saveNew()}" value="#{mensajes.Save}" update="#{documentosJudicialesPorSecretariaController.updateCreate()}" oncomplete="handleSubmit(xhr,status,args,PF('DocumentosCreateDialog'));">
                        <p:confirm header="#{mensajes.ConfirmationHeader}" message="#{mensajes.ConfirmCreateMessage}" icon="ui-icon-alert"/>
                    </p:commandButton>

                    <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('DocumentosCreateDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                </h:panelGroup>

            </h:form>

        </p:dialog>

    </ui:composition>

</html>
