<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <div class="ui-g">
            <p:dialog id="ExpActasSesionCreateDlg" widgetVar="ExpActasSesionCreateDialog" modal="true" width="80%" positionType="absolute" position="top" resizable="false" appendTo="@(body)" header="Acta de Sesión" closeOnEscape="true">

                <h:form id="ExpActasSesionCreateForm" enctype="multipart/form-data">

                    <h:panelGroup id="display" rendered="#{actasSesionController.selected != null}">

                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <h:outputText style="font-size: 20px" value="Tipo sesión"/>
                            </div>
                            <div class="ui-sm-10 ui-md-9 ui-g-9">
                                <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%">
                                    <h:panelGroup style="width: 100%">
                                        <p:selectOneMenu filter="true" style="width: 100%" filterMatchMode="contains" id="tipoSesion" value="#{actasSesionController.selected.tipoSesion}" required="false" converter="expTiposSesionConverter">
                                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                            <f:selectItems value="#{expTiposSesionController.items}"
                                                           var="tipoSesionItem"
                                                           itemValue="#{tipoSesionItem}"
                                                           itemLabel="#{tipoSesionItem.descripcion}"
                                                           />
                                        </p:selectOneMenu>
                                    </h:panelGroup>
                                </p:panelGrid>
                            </div>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <p:outputLabel value="Fecha sesión" />
                            </div>
                            <div class="ui-sm-12 ui-md-9 ui-g-9">
                                <p:calendar pattern="dd/MM/yyyy" value="#{actasSesionController.selected.fechaSesion}" title="Fecha sesión" required="true" requiredMessage="Debe ingresar fecha sesión" showOn="button"/>
                            </div>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:fieldset style="width: 100%">
                                <div class="ui-sm-12 ui-md-3 ui-g-3">
                                    <h:outputText style="font-size: 20px" value="Alzar archivo" />
                                </div>
                                <div class="ui-sm-12 ui-md-9 ui-g-9">
                                    <p:panelGrid columns="2" style="width: 100%">
                                        <p:fileUpload value="#{actasSesionController.file}" accept=".pdf,.PDF" mode="simple" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser un pdf" allowTypes="/(\.|\/)(pdf|PDF)$/" disabled="false" />
                                    </p:panelGrid>
                                </div>
                            </p:fieldset>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:fieldset legend="Firmantes" style="width: 100%">
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <p:panelGrid columns="2" styleClass="ui-noborder">
                                        <p:selectOneMenu filter="true" style="width: 100%" id="firmantes" filterMatchMode="contains" value="#{actasSesionController.personaFirmante}" converter="personasConverter">
                                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                            <f:selectItems value="#{actasSesionController.listaPosiblesFirmantes}"
                                                           var="personaItem"
                                                           itemValue="#{personaItem}"
                                                           itemLabel="#{personaItem.ci} - #{personaItem.nombresApellidos}"
                                                           />

                                        </p:selectOneMenu>
                                        <p:commandButton id="agregarPersonaFirmanteButton" value="Agregar" actionListener="#{actasSesionController.agregarPersonaFirmante()}" update="datalistPersonasFirmantes, :growl"/>
                                    </p:panelGrid>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <p:dataTable id="datalistPersonasFirmantes"
                                                 value="#{actasSesionController.listaPersonasFirmantes}"
                                                 lazy="false" emptyMessage="#{mensajes.NoRegistros}"
                                                 rowKey="#{item.id}"
                                                 var="item"
                                                 tableStyle="width:auto"
                                                 paginator="false">

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Cedula"/>
                                            </f:facet>
                                            <h:outputText value="#{item.ci}"/>
                                        </p:column>

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Nombre"/>
                                            </f:facet>
                                            <h:outputText value="#{item.nombresApellidos}"/>
                                        </p:column>

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Firmado"/>
                                            </f:facet>
                                            <h:outputText value="#{item.firmadoString}"/>
                                        </p:column>

                                        <p:column style="width:15px;">
                                            <p:commandButton id="borrarPersonaFirmanteButton" value="Borrar" actionListener="#{actasSesionController.borrarPersonaFirmante(item)}" update="datalistPersonasFirmantes, :growl"/>
                                        </p:column>
                                    </p:dataTable>
                                </div>
                            </p:fieldset>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:fieldset legend="Expedientes asociados" style="width: 100%">
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <p:panelGrid columns="2" styleClass="ui-noborder">
                                        <p:selectOneMenu filter="true" style="width: 300px" id="expedientes" filterMatchMode="contains" value="#{actasSesionController.expediente}" converter="documentosJudicialesConverter">
                                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                            <f:selectItems value="#{actasSesionController.listaPosiblesExpedientes}"
                                                           var="expedienteItem"
                                                           itemValue="#{expedienteItem}"
                                                           itemLabel="#{expedienteItem.causa} - #{expedienteItem.caratulaString}"
                                                           />

                                        </p:selectOneMenu>
                                        <p:commandButton id="agregarExpedienteButton" value="Agregar" actionListener="#{actasSesionController.agregarExpediente()}" update="datalistExpedientes"/>
                                    </p:panelGrid>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <p:dataTable id="datalistExpedientes"
                                                 value="#{actasSesionController.listaExpedientes}"
                                                 lazy="false" emptyMessage="#{mensajes.NoRegistros}"
                                                 rowKey="#{item.id}"
                                                 var="item"
                                                 tableStyle="width:auto"
                                                 paginator="false">

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Nro causa"/>
                                            </f:facet>
                                            <h:outputText value="#{item.causa}"/>
                                        </p:column>

                                        <p:column>
                                            <f:facet name="header">
                                                <h:outputText value="Carátula"/>
                                            </f:facet>
                                            <h:outputText value="#{item.caratulaString}"/>
                                        </p:column>

                                        <p:column style="width:15px;">
                                            <p:commandButton id="borrarExpedienteButton" value="Borrar" actionListener="#{actasSesionController.borrarExpediente(item)}" update="datalistExpedientes, :growl"/>
                                        </p:column>
                                    </p:dataTable>
                                </div>
                            </p:fieldset>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <div class="ui-sm-12 ui-md-3 ui-g-3">
                                <h:outputText style="font-size: 20px" value="Estado"/>
                            </div>
                            <div class="ui-sm-10 ui-md-9 ui-g-9">
                                <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%">
                                    <h:panelGroup style="width: 100%">
                                        <p:selectOneMenu filter="true" style="width: 100%" filterMatchMode="contains" id="estado" value="#{actasSesionController.estadoActaSesion}" converter="estadosActaSesionConverter">
                                            <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                            <f:selectItems value="#{actasSesionController.listaEstadosActaSesion}"
                                                           var="estadoItem"
                                                           itemValue="#{estadoItem}"
                                                           itemLabel="#{estadoItem.descripcion}"
                                                           />
                                        </p:selectOneMenu>
                                    </h:panelGroup>
                                </p:panelGrid>
                            </div>
                        </div>
                        <div class="ui-sm-12 ui-md-12 ui-g-12">
                            <p:commandButton id="botonGuardar" onclick="botonGuardar.disable()" action="#{actasSesionController.saveNew()}" ajax="true" value="#{mensajes.Save}" update="display,:ExpActasSesionListForm:datalist,:growl, :menuform" oncomplete="handleSubmit(xhr,status,args,PF('ExpActasSesionCreateDialog'));" >
                                <f:ajax execute="@all" render="@form" onevent="endHandler();" onerror="endHandler();"/>
                            </p:commandButton>
                            <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('ExpActasSesionCreateDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                        </div>
                    </h:panelGroup>

                </h:form>

            </p:dialog>
        </div>
    </ui:composition>

</html>
