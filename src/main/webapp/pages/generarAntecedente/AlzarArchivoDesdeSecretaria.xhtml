<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog positionType="absolute" id="GenerarAntecedenteAlzarArchivoDesdeSecretariaDlg" widgetVar="GenerarAntecedenteAlzarArchivoDesdeSecretariaDialog" modal="true" resizable="false" appendTo="@(body)" header="#{mensajes.CreateDocumentosTitle}" closeOnEscape="true">

            <h:form id="GenerarAntecedenteAlzarArchivoDesdeSecretariaForm" enctype="multipart/form-data">
                <h:panelGroup id="display2" rendered="#{generarAntecedenteController.personaSelected != null}">
                    <p:panelGrid columns="2" columnClasses="column">
                        <h:outputText value="Adjuntar Documento"/>
                        <p:panelGrid columns="2" >
                            <p:fileUpload value="#{generarAntecedenteController.file}" mode="simple" previewWidth="100"  auto="false"  cancelLabel="Cancelar" uploadLabel="Alzar" label="Buscar" invalidFileMessage="El archivo debe ser un pdf" accept=".pdf,.PDF" allowTypes="/(\.|\/)(pdf|PDF)$/" disabled="false" />
                        </p:panelGrid>
                    </p:panelGrid>
                    <p:commandButton id="botonGuardar" onclick="this.form.target = '_blank'" widgetVar="botonGuardarWV" rendered="true" value="Generar" icon="ui-icon-arrow-u" ajax="false" update=":growl, :GenerarAntecedenteListForm:datalist" oncomplete="handleSubmit(xhr,status,args,PF('GenerarAntecedenteAlzarArchivoDesdeSecretariaDialog'));" action="#{antecedentesController.generarAntecedente(generarAntecedenteController.file, generarAntecedenteController.personaSelected, true)}" disabled="false"/>
                    <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('GenerarAntecedenteAlzarArchivoDesdeSecretariaDialog').hide()" process="@this" immediate="true" resetValues="true"/>
                </h:panelGroup>
            </h:form>

        </p:dialog>

    </ui:composition>

</html>
