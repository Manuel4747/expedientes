<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui">

    <h:form id="ExpVerActasSesionListForm">
        <div class="ui-g">

            <div class="ui-sm-12 ui-md-12 ui-g-12">
                <p:panel header="#{expVerActasSesionController.titulo}">
                    <p:dataTable id="datalist"
                                 value="#{expVerActasSesionController.listaPendientes}"
                                 lazy="false"
                                 rowKey="#{item.id}"
                                 var="item"
                                 paginator="true"
                                 rows="10"
                                 paginatorPosition="bottom  "
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 selectionMode="single"
                                 selection="#{expVerActasSesionController.selected}">


                        <p:column sortBy="#{item.tipoSesion.descripcion}" filterBy="#{item.tipoSesion.descripcion}">
                            <f:facet name="header">
                                <h:outputText value="Tipo sesión"/>
                            </f:facet>
                            <h:outputText value="#{item.tipoSesion.descripcion}"/>
                        </p:column>

                        <p:column >
                            <f:facet name="header">
                                <h:outputText value="Fecha sesión"/>
                            </f:facet>
                            <h:outputText value="#{item.fechaSesion}">
                                <f:convertDateTime pattern="#{expVerActasSesionController.datePattern()}" timeZone="America/Asuncion"/>
                            </h:outputText>
                        </p:column>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Ver"/>
                            </f:facet>
                            <p:commandLink action="#{expVerActasSesionController.navigateActuacion(item)}" ajax="false" update=":growl" >
                                Ver
                            </p:commandLink>
                        </p:column>

                    </p:dataTable>

                </p:panel>
            </div>
        </div>
        <ui:include src="/pages/confirmation.xhtml"/>
    </h:form>

</ui:composition>
