<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>
        <p:dialog id="ExpAcusacionesOtroArchivoDlg" widgetVar="ExpAcusacionesOtroArchivoDialog" modal="true" resizable="false"  appendTo="@(body)" closeOnEscape="true">

            <h:form id="ExpAcusacionesOtroArchivoForm">

                    <div align="center">
                        <p:outputLabel value="¿Desea agregar otro documento?" />
                    </div>
                    <p:panelGrid columns="2" styleClass="ui-noborder">

                        <p:commandButton actionListener="#{documentosJudicialesController.prepareCreateActuacion(false)}" value="#{mensajes.Yes}" update=":growl" oncomplete="PF('ExpAcusacionesOtroArchivoDialog').hide()"/>
                        <p:commandButton value="#{mensajes.No}" oncomplete="PF('ExpAcusacionesOtroArchivoDialog').hide()" process="@this" immediate="true" resetValues="true"/>
                    </p:panelGrid>
            </h:form>

        </p:dialog>

    </ui:composition>

</html>
