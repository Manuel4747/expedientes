<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>
        <div class="ui-g">
            <p:dialog id="PedidosAntecedenteEditDlg" positionType="absolute" widgetVar="PedidosAntecedenteEditDialog" modal="true" resizable="false"  appendTo="@(body)" header="#{mensajes.EditPedidosAntecedenteTitle}" closeOnEscape="true">

                <h:form id="PedidosAntecedenteEditForm">

                    <h:panelGroup id="display">
                        <div class="ui-md-4 ui-lg-4 ui-g-4">

                        </div>
                        <div class="ui-sm-12 ui-md-4 ui-lg-4 ui-g-4">
                            <p:fieldset style="width: 100%">
                                <div class="ui-sm-12 ui-md-12 ui-lg-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-2 ui-lg-2 ui-g-2">
                                    </div>
                                    <div class="ui-sm-12 ui-md-8 ui-lg-8 ui-g-8">
                                        <p:panelGrid columns="1" styleClass="ui-noborder">
                                            <p align="center">Antes de solicitar sus antecedentes, por favor, verifique sus datos
                                            </p>
                                        </p:panelGrid>
                                    </div>
                                    <div class="ui-sm-12 ui-md-2 ui-lg-2 ui-g-2">
                                    </div>
                                </div>
                            </p:fieldset>
                            <p:fieldset style="width: 100%" legend="Actualización de datos">
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <p:outputLabel value="#{mensajes.EditPedidosAntecedenteLabel_ci}" for="ci" />
                                    </div>
                                    <div class="ui-sm-10 ui-md-9 ui-g-9">
                                        <p:inputNumber id="ci" readonly="true" style="width: 100%" onclick="PF('PedidosAntecedenteAvisoDialog').show();" value="#{pedidosAntecedenteController.persona.ci}" decimalSeparator="," decimalPlaces="0" thousandSeparator="" maxValue="99999999" title="#{mensajes.EditPedidosAntecedenteTitle_ci}" required="false" requiredMessage="#{mensajes.EditPedidosAntecedenteRequiredMessage_ci}" maxlength="20">

                                        </p:inputNumber>

                                    </div>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <p:outputLabel value="#{mensajes.EditPedidosAntecedenteLabel_nombresApellidos}" for="nombresApellidos" />
                                    </div>
                                    <div class="ui-sm-10 ui-md-9 ui-g-9">
                                        <p:inputText id="nombresApellidos" readonly="true" onclick="PF('PedidosAntecedenteAvisoDialog').show();" onblur="value = value.toUpperCase()" style="text-transform:uppercase; width: 100%" value="#{pedidosAntecedenteController.persona.nombresApellidos}" title="#{mensajes.EditPedidosAntecedenteTitle_nombresApellidos}" required="true" requiredMessage="#{mensajes.EditPedidosAntecedenteRequiredMessage_nombresApellidos}" maxlength="100"/>
                                    </div>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <p:outputLabel value="#{mensajes.EditPedidosAntecedenteLabel_email}" for="email" />
                                    </div>
                                    <div class="ui-sm-10 ui-md-9 ui-g-9">
                                        <p:inputText id="email" value="#{pedidosAntecedenteController.persona.email}" title="#{mensajes.EditPedidosAntecedenteTitle_email}" required="false" requiredMessage="#{mensajes.EditPedidosAntecedenteRequiredMessage_email}"  style="width: 100%" maxlength="100"/>
                                    </div>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <p:outputLabel value="#{mensajes.EditPedidosAntecedenteLabel_telefono1}" for="telefono1" />
                                    </div>
                                    <div class="ui-sm-10 ui-md-9 ui-g-9">
                                        <p:inputText id="telefono1" value="#{pedidosAntecedenteController.persona.telefono1}" title="#{mensajes.EditPedidosAntecedenteTitle_telefono1}" required="false" requiredMessage="#{mensajes.EditPedidosAntecedenteRequiredMessage_telefono1}"  style="width: 100%" maxlength="100"/>
                                    </div>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <p:outputLabel value="#{mensajes.EditPedidosAntecedenteLabel_telefono2}" for="telefono2" />
                                    </div>
                                    <div class="ui-sm-10 ui-md-9 ui-g-9">
                                        <p:inputText id="telefono2" value="#{pedidosAntecedenteController.persona.telefono2}" title="#{mensajes.EditPedidosAntecedenteTitle_telefono2}" required="false" requiredMessage="#{mensajes.EditPedidosAntecedenteRequiredMessage_telefono2}"  style="width: 100%" maxlength="100"/>
                                    </div>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <p:outputLabel value="#{mensajes.EditPedidosAntecedenteLabel_despachoPersona}" for="despachoPersona" />
                                    </div>
                                    <div class="ui-sm-10 ui-md-9 ui-g-9">
                                        <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%">
                                            <h:panelGroup style="width: 100%">
                                                <p:selectOneMenu id="despachoPersona" filter="true" filterMatchMode="contains" value="#{pedidosAntecedenteController.persona.despachoPersona}"  converter="despachosPersonaConverter">
                                                    <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                                    <f:selectItems value="#{despachosPersonaController.items}"
                                                                   var="despachoPersonaItem"
                                                                   itemValue="#{despachoPersonaItem}"
                                                                   itemLabel="#{despachoPersonaItem.descripcion}"
                                                                   />

                                                </p:selectOneMenu>
                                            </h:panelGroup>
                                        </p:panelGrid>
                                    </div>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <p:outputLabel value="#{mensajes.EditPedidosAntecedenteLabel_departamentoPersona}" for="departamentoPersona" />
                                    </div>
                                    <div class="ui-sm-10 ui-md-9 ui-g-9">
                                        <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%">
                                            <h:panelGroup style="width: 100%">
                                                <p:selectOneMenu id="departamentoPersona" filter="true" filterMatchMode="contains" value="#{pedidosAntecedenteController.departamentoPersona}"  converter="departamentosPersonaConverter">
                                                    <p:ajax event="change" update="localidadPersona" listener="#{pedidosAntecedenteController.actualizarListaLocalidades()}"/>
                                                    <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                                    <f:selectItems value="#{departamentosPersonaController.items}"
                                                                   var="departamentoPersonaItem"
                                                                   itemValue="#{departamentoPersonaItem}"
                                                                   itemLabel="#{departamentoPersonaItem.descripcion}"
                                                                   />

                                                </p:selectOneMenu>
                                            </h:panelGroup>
                                        </p:panelGrid>
                                    </div>
                                </div>
                                <div class="ui-sm-12 ui-md-12 ui-g-12">
                                    <div class="ui-sm-12 ui-md-3 ui-g-3">
                                        <p:outputLabel value="#{mensajes.EditPedidosAntecedenteLabel_localidadPersona}" for="localidadPersona" />
                                    </div>
                                    <div class="ui-sm-10 ui-md-9 ui-g-9">
                                        <p:panelGrid columns="1" styleClass="ui-noborder" style="width: 100%">
                                            <h:panelGroup style="width: 100%">
                                                <p:selectOneMenu id="localidadPersona" filter="true" filterMatchMode="contains" value="#{pedidosAntecedenteController.localidadPersona}"  converter="localidadesPersonaConverter">
                                                    <f:selectItem itemLabel="#{mensajes.SelectOneMessage}"/>
                                                    <f:selectItems value="#{pedidosAntecedenteController.listaLocalidadesPersona}"
                                                                   var="localidadPersonaItem"
                                                                   itemValue="#{localidadPersonaItem}"
                                                                   itemLabel="#{localidadPersonaItem.descripcion}"
                                                                   />

                                                </p:selectOneMenu>
                                            </h:panelGroup>
                                        </p:panelGrid>
                                    </div>
                                </div>
                            </p:fieldset>

                            <div class="ui-sm-12 ui-md-12 ui-g-12">
                                <p:commandButton ajax="false" actionListener="#{pedidosAntecedenteController.solicitarAntecedentes()}" value="Guardar y solicitar antecedentes" update=":growl" oncomplete="handleSubmit(xhr,status,args,PF('PedidosAntecedenteEditDialog'));"/>

                                <p:commandButton value="#{mensajes.Cancel}" oncomplete="PF('PedidosAntecedenteEditDialog').hide()" update="display" process="@this" immediate="true" resetValues="true"/>
                            </div>
                        </div>
                        <div class="ui-sm-12 ui-md-4 ui-lg-4 ui-g-4">
                        </div>
                    </h:panelGroup>

                    <ui:include src="/pages/pedidosAntecedente/Aviso.xhtml"/>
                </h:form>

            </p:dialog>
        </div>
    </ui:composition>

</html>
